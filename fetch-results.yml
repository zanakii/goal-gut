# .github/workflows/fetch-results.yml
#
# This runs every 10 minutes between 4PM and 6AM UTC (5PM-7AM BST)
# during June 2026 (the World Cup group stage).
#
# It calls fetch-results.js which:
#   1. Checks if there are unfinished matches today
#   2. If yes, calls api-football.com API (1 request)
#   3. Updates finished match scores in Supabase
#
# Budget: ~84 triggers/day, but smart-skip means only ~30-50 API calls
# on match days, 0 on rest days. Well within the 100/day free limit.

name: Fetch WC Results

on:
  schedule:
    # Every 10 min, 4PM-11PM UTC
    - cron: '*/10 16-23 * 6 *'
    # Every 10 min, 12AM-6AM UTC
    - cron: '*/10 0-5 * 6 *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node fetch-results.js
