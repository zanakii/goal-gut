              ))
            )
          : h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.3)", textAlign: "center", padding: "8px 0" } },
              "Constrói a Fase Final para completar o pódio →")
      )
    ),
    // Matches by group
    ...GROUP_ORDER.map(grp => {
      const matches = groupMatches[grp];
      if (!matches.length) return null;
      const grpStandings = standings[grp] || [];
      const allZero = grpStandings.every(t => t.pts === 0 && t.gd === 0);

      const miniStandings = h("div", { className: "group-standings" },
        h("div", { style: { background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "10px", padding: "10px 12px" } },
          grpStandings.map((t, i) =>
            h("div", { style: { display: "flex", alignItems: "center", gap: "6px", padding: "4px 0", borderBottom: i < grpStandings.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none" } },
              h("span", { style: { fontSize: "11px", width: "14px", flexShrink: 0 } }, i < 2 ? "🟢" : ""),
              h("span", { style: { flex: 1, fontSize: "11px", fontWeight: 600, color: "rgba(255,255,255,0.8)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, teamWithFlag(t.team)),
              h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.4)", whiteSpace: "nowrap" } }, `${t.pts}pt`),
              h("span", { style: { fontSize: "10px", color: t.gd > 0 ? "#34d399" : t.gd < 0 ? "#f87171" : "rgba(255,255,255,0.3)", whiteSpace: "nowrap", minWidth: "28px", textAlign: "right" } }, t.gd > 0 ? `+${t.gd}` : `${t.gd}`)
            )
          ),
          allZero ? h("div", { style: { fontSize: "10px", color: "rgba(255,255,255,0.25)", textAlign: "center", marginTop: "8px" } }, "Edita os resultados para ver a classificação") : null
        )
      );

      return h("div", { style: { marginBottom: "24px" } },
        h("div", { style: { fontSize: "11px", fontWeight: 700, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" } }, `Grupo ${grp}`),
        h("div", { className: "group-section" },
          h("div", null,
            ...matches.map(m => {
              const played = m.score_a !== null;
              const pred = state.editPreds[m.id] || { score_a: 0, score_b: 0 };
              const pts = played ? calcPts(pred, m) : null;
              const ex = played && isExact(pred, m);
              const locked = played || state.lockPassed;

              const inpA = document.createElement("input");
              inpA.type = "number"; inpA.min = "0"; inpA.max = "20"; inpA.value = pred.score_a;
              inpA.className = "pred-input"; inpA.disabled = locked;
              inpA.addEventListener("change", () => { if (!locked) { const ep = { ...state.editPreds }; ep[m.id] = { ...ep[m.id], score_a: parseInt(inpA.value) || 0 }; state.editPreds = ep; state.predictionsEdited = true; render(); } });

              const inpB = document.createElement("input");
              inpB.type = "number"; inpB.min = "0"; inpB.max = "20"; inpB.value = pred.score_b;
              inpB.className = "pred-input"; inpB.disabled = locked;
              inpB.addEventListener("change", () => { if (!locked) { const ep = { ...state.editPreds }; ep[m.id] = { ...ep[m.id], score_b: parseInt(inpB.value) || 0 }; state.editPreds = ep; state.predictionsEdited = true; render(); } });

              return h("div", { style: { padding: "10px 12px", borderRadius: "10px", background: ex ? "rgba(16,185,129,0.06)" : played ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.03)", border: `1px solid ${ex ? "rgba(16,185,129,0.15)" : played ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.06)"}`, marginBottom: "4px" } },
                h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: "6px" } },
                  h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.3)" } }, `${fmtShort(m.kickoff)} · ${fmtTime(m.kickoff)}`),
                  played ? h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.25)" } }, `Resultado: ${m.score_a}-${m.score_b}`) : null,
                  pts !== null ? badge(pts, true) : null
                ),
                h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
                  h("span", { style: { flex: 1, fontSize: "12px", fontWeight: 600, color: "rgba(255,255,255,0.75)", textAlign: "right" } }, teamWithFlag(m.team_a)),
                  inpA,
                  h("span", { style: { fontSize: "13px", color: "rgba(255,255,255,0.2)", fontWeight: 700 } }, "-"),
                  inpB,
                  h("span", { style: { flex: 1, fontSize: "12px", fontWeight: 600, color: "rgba(255,255,255,0.75)", textAlign: "left" } }, teamWithFlag(m.team_b))
                )
              );
            })
          ),
          miniStandings
        )
      );
    }),
    // Lock/reveal banner / countdown
    renderLockBanner(),
    // Submit / update button — hidden once the submission lock passes
    !state.lockPassed ? h("div", { style: { position: "sticky", bottom: "72px", zIndex: 50, padding: "8px 0" } },
      h("button", { className: "submit-btn", onClick: submitPredictions, disabled: state.submitting, style: state.submitting ? { opacity: 0.6, cursor: "wait" } : {} },
        state.submitting ? "A submeter..." : state.submitted ? "Actualizar Prognósticos" : "Submeter Prognósticos")
    ) : null
  );
}

async function submitChangePin() {
  if (state.changePinSubmitting) return;
  const { current, next, confirm } = state.changePinValues;
  if (!current || !next || !confirm) { setState({ changePinError: 'missing' }); return; }
  if (next !== confirm) { setState({ changePinError: 'mismatch' }); return; }
  if (next === current) { setState({ changePinError: 'same' }); return; }
  if (next.length < 4) { setState({ changePinError: 'too_short' }); return; }
  setState({ changePinSubmitting: true, changePinError: null });
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/change-pin`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ player_id: state.viewerPlayerId, current_pin: current, new_pin: next })
    });
    const data = await res.json();
    if (!res.ok) {
      setState({ changePinError: res.status === 401 ? 'wrong_current' : null, changePinSubmitting: false });
      if (res.status !== 401) alert("Erro: " + (data.error || res.status));
      return;
    }
    localStorage.setItem(`goalgut_pin_set_${state.viewerPlayerId}`, "1");
    state.viewerPin = next;
    setState({ showChangePinModal: false, changePinSubmitting: false, changePinError: null,
      changePinValues: { current: "", next: "", confirm: "" }, changePinSuccess: true });
    logEvent('pin_change');
    setTimeout(() => { state.changePinSuccess = false; render(); }, 3000);
  } catch (e) {
    setState({ changePinSubmitting: false });
    alert("Erro: " + e.message);
  }
}

function renderChangePinPrompt() {
  if (!state.showChangePinPrompt) return null;
  return h("div", { className: "pin-overlay" },
    h("div", { className: "pin-modal" },
      h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, "💡"),
      h("div", { style: { fontSize: "15px", fontWeight: 700, color: "#fff", marginBottom: "4px" } }, "Alterar PIN?"),
      h("div", { style: { fontSize: "13px", color: "rgba(255,255,255,0.55)", marginBottom: "20px", lineHeight: "1.5" } },
        "Queres definir um PIN mais fácil de memorizar?"),
      h("button", { className: "pin-btn", onClick: () => setState({ showChangePinPrompt: false, showChangePinModal: true, changePinValues: { current: "", next: "", confirm: "" }, changePinError: null }) }, "Sim, alterar"),
      h("button", { className: "pin-cancel", onClick: () => setState({ showChangePinPrompt: false }) }, "Agora não")
    )
  );
}

function renderChangePinModal() {
  if (!state.showChangePinModal) return null;
  const player = state.players.find(p => p.id === state.viewerPlayerId);
  const errMsgs = { missing: "Preenche todos os campos", wrong_current: "PIN atual incorrecto", mismatch: "Os PINs não coincidem", too_short: "O novo PIN deve ter pelo menos 4 caracteres", same: "O novo PIN é igual ao atual" };

  const makeInp = (field, placeholder, highlight) => {
    const inp = document.createElement("input");
    inp.type = "password"; inp.maxLength = 30; inp.placeholder = placeholder;
    inp.value = state.changePinValues[field];
    inp.style.cssText = `display:block;width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid ${highlight ? '#ef4444' : 'rgba(255,255,255,0.12)'};font-size:14px;font-family:inherit;outline:none;margin-bottom:8px;`;
    inp.addEventListener("input", (e) => { state.changePinValues = { ...state.changePinValues, [field]: e.target.value }; state.changePinError = null; });
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") submitChangePin(); });
    return inp;
  };

  const err = state.changePinError;
  const inpCurrent = makeInp('current', 'PIN atual', err === 'wrong_current' || err === 'missing');
  const inpNext    = makeInp('next',    'Novo PIN',  err === 'mismatch' || err === 'too_short' || err === 'same' || err === 'missing');
  const inpConfirm = makeInp('confirm', 'Confirmar novo PIN', err === 'mismatch' || err === 'missing');

  setTimeout(() => {
    if (!state.changePinValues.current) inpCurrent.focus();
    else if (!state.changePinValues.next) inpNext.focus();
    else inpConfirm.focus();
  }, 50);

  return h("div", { className: "pin-overlay" },
    h("div", { className: "pin-modal" },
      h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, "🔑"),
      h("div", { style: { fontSize: "14px", fontWeight: 700, color: "#fff", marginBottom: "2px" } }, "Alterar PIN"),
      h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "16px" } },
        "A alterar PIN de ", h("span", { style: { color: "#34d399", fontWeight: 700 } }, player?.name || "")),
      inpCurrent, inpNext, inpConfirm,
      err ? h("div", { style: { fontSize: "12px", color: "#ef4444", fontWeight: 600, marginBottom: "8px", textAlign: "left" } }, errMsgs[err] || "Erro") : null,
      h("button", { className: "pin-btn", disabled: state.changePinSubmitting, onClick: submitChangePin, style: state.changePinSubmitting ? { opacity: 0.6, cursor: "wait" } : {} },
        state.changePinSubmitting ? "A guardar..." : "Confirmar"),
      h("button", { className: "pin-cancel", onClick: () => setState({ showChangePinModal: false, changePinError: null, changePinValues: { current: "", next: "", confirm: "" } }) }, "Cancelar")
    )
  );
}

function renderIdentityModal() {
  if (!state.identityModalOpen) return null;
  return h("div", { className: "pin-overlay" },
    h("div", { className: "pin-modal" },
      h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, "👋"),
      h("div", { style: { fontSize: "15px", fontWeight: 700, color: "#fff", marginBottom: "4px" } }, "Quem és tu?"),
      h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "16px" } },
        "Identifica-te para aceder aos teus prognósticos"),
      ...playersThenObservers(state.players).map(p =>
        h("button", {
          style: { display: "block", width: "100%", padding: "10px 16px", margin: "4px 0", borderRadius: "10px",
            border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)",
            color: "#fff", fontSize: "14px", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", textAlign: "center" },
          onClick: () => { setState({ identityModalOpen: false }); requestBootPin(p); }
        }, playerLabel(p))
      )
    )
  );
}

function renderPinModal() {
  if (!state.showPinModal) return null;
  const inp = document.createElement("input");
  inp.type = "password"; inp.maxLength = 30; inp.placeholder = "••••••";
  inp.className = "pin-input" + (state.pinError ? " error" : "");
  inp.value = state.pinValue;
  inp.addEventListener("input", (e) => { state.pinValue = e.target.value; state.pinError = false; });
  inp.addEventListener("keydown", (e) => { if (e.key === "Enter") verifyPin(); });
  setTimeout(() => inp.focus(), 100);

  return h("div", { className: "pin-overlay", onClick: (e) => { if (e.target.className === "pin-overlay") cancelPin(); } },
    h("div", { className: "pin-modal" },
      h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, state.bootPinPlayerName ? "👋" : "🔒"),
      h("div", { style: { fontSize: "15px", fontWeight: 700, color: "#fff", marginBottom: "4px" } }, "Introduz o teu código"),
      h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "4px" } },
        state.bootPinPlayerName ? "Identifica-te como " : "A submeter como ",
        h("span", { style: { color: "#34d399", fontWeight: 700 } }, state.bootPinPlayerName || state.currentPlayer?.name || "")
      ),
      inp,
      state.pinError ? h("div", { style: { fontSize: "12px", color: "#ef4444", fontWeight: 600, marginBottom: "8px" } }, "Código incorrecto") : null,
      h("button", { className: "pin-btn", onClick: verifyPin }, "Confirmar"),
      h("button", { className: "pin-cancel", onClick: cancelPin }, "Cancelar")
    )
  );
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (state.loading) {
    app.appendChild(h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "80vh", gap: "16px" } },
      h("div", { className: "spinner" }), h("div", { style: { color: "rgba(255,255,255,0.5)", fontSize: "13px" } }, "A carregar dados...")
    ));
    return;
  }
  if (state.error) {
    app.appendChild(h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "80vh", gap: "12px", padding: "20px" } },
      h("div", { style: { fontSize: "32px" } }, "⚠️"),
      h("div", { style: { color: "#ef4444", fontSize: "14px", fontWeight: 600 } }, "Erro ao carregar"),
      h("div", { style: { color: "rgba(255,255,255,0.4)", fontSize: "12px", textAlign: "center" } }, state.error),
      h("button", { onClick: loadData, style: { marginTop: "8px", padding: "8px 20px", borderRadius: "8px", border: "none", background: "#34d399", color: "#0f172a", fontWeight: 700, fontSize: "13px", cursor: "pointer", fontFamily: "inherit" } }, "Tentar novamente")
    ));
    return;
  }

  app.appendChild(renderHeader());

  if (state.view === "matches") app.appendChild(renderMatches());
  else if (state.view === "matchDetail") app.appendChild(renderMatchDetail());
  else if (state.view === "leaderboard") app.appendChild(renderLeaderboard());
  else if (state.view === "predictions") app.appendChild(renderPredictions());
  else if (state.view === "bracket") app.appendChild(renderBracket());

  app.appendChild(renderNav());

  // Identity and PIN modal overlays
  const identityModal = renderIdentityModal();
  if (identityModal) app.appendChild(identityModal);
  const pinModal = renderPinModal();
  if (pinModal) app.appendChild(pinModal);

  // Change PIN modals
  const changePinPrompt = renderChangePinPrompt();
  if (changePinPrompt) app.appendChild(changePinPrompt);
  const changePinModal = renderChangePinModal();
  if (changePinModal) app.appendChild(changePinModal);

  // Success toast
  if (state.changePinSuccess) {
    app.appendChild(h("div", { style: { position: "fixed", bottom: "90px", left: "50%", transform: "translateX(-50%)", background: "#34d399", color: "#0f172a", fontWeight: 700, fontSize: "13px", borderRadius: "20px", padding: "10px 20px", zIndex: 300, animation: "fadeIn 0.2s ease", whiteSpace: "nowrap" } }, "PIN alterado com sucesso"));
  }

  // Standings modal overlay
  const standingsModal = renderStandingsModal();
  if (standingsModal) app.appendChild(standingsModal);

  // Init charts on leaderboard view (main + observers, where applicable)
  if (state.view === "leaderboard") {
    setTimeout(() => initCharts(), 0);
  }

  // Auto-scroll to today on predictions view
  if (state.view === "predictions") {
    setTimeout(() => { const el = document.getElementById("today-anchor"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 200);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────
window.addEventListener("beforeunload", (e) => {
  if (state.predictionsEdited && !state.lockPassed) {
    e.preventDefault();
    e.returnValue = "Tens prognósticos por submeter.";
  }
});
loadData();
</script>
