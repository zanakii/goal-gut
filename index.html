<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #fff; font-family: 'DM Sans', -apple-system, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* Nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; padding: 6px 0 env(safe-area-inset-bottom, 8px); }
  .nav button { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; padding: 4px 16px; transition: color 0.2s; font-family: inherit; }
  .nav button.active { color: #34d399; }

  /* Header */
  .header { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 90; border-bottom: 1px solid rgba(52,211,153,0.15); display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-circle { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #34d399, #06b6d4); display: flex; align-items: center; justify-content: center; }
  .player-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 6px 14px; color: #34d399; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; position: relative; }

  .player-dropdown button { display: block; width: 100%; padding: 10px 16px; border: none; background: transparent; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; font-family: inherit; border-bottom: 1px solid rgba(255,255,255,0.05); }

  .group-label { font-size: 12px; font-weight: 700; color: #34d399; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 4px; }

  /* Match card */
  .match-card { display: flex; align-items: center; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); font-family: inherit; width: 100%; text-align: left; cursor: pointer; margin-bottom: 4px; }
  .match-card.upcoming { opacity: 0.5; cursor: default; }
  .match-card.exact { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }

  /* Filter buttons */
  .filters { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* Score display */
  .score-box { font-size: 14px; font-weight: 900; color: #fff; background: rgba(52,211,153,0.12); padding: 2px 8px; border-radius: 6px; font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }

  .pred-input:disabled { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.06); cursor: not-allowed; }

  .pin-input { width: 140px; height: 48px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: 8px; background: rgba(255,255,255,0.06); color: #fff; border: 2px solid rgba(52,211,153,0.3); border-radius: 12px; font-family: inherit; outline: none; margin: 16px 0; }
  .pin-input:focus { border-color: #34d399; }
  .pin-input.error { border-color: #ef4444; animation: shake 0.3s ease; }
  .pin-btn { padding: 10px 24px; border-radius: 10px; border: none; background: #34d399; color: #0f172a; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; }
  .pin-cancel { padding: 8px 24px; border-radius: 10px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 8px; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* Deadline banner */
  .deadline-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; text-align: center; }

  /* Chart */
  .chart-wrap { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; margin-bottom: 20px; }

  /* Bracket */
  .bracket-match { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; margin-bottom: 4px; }
  .bracket-match--picked { border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.04); }
  .bracket-select { flex: 1; padding: 7px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 12px; font-weight: 600; font-family: inherit; outline: none; cursor: pointer; }
  .bracket-select:disabled { opacity: 0.4; cursor: not-allowed; }
  .bracket-pill { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; transition: background 0.15s, color 0.15s; }
  .bracket-pill--picked { background: #34d399; color: #0f172a; border-color: #34d399; }
  .bracket-pill:not(.bracket-pill--picked):hover { background: rgba(255,255,255,0.1); }

  /* Predictions — group sections */
  .group-section { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) {
    .group-section { grid-template-columns: 1fr 200px; align-items: start; }
    .group-standings { position: sticky; top: 80px; }
  }

  /* Standings modal */
  .standings-modal { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; width: calc(100% - 32px); max-width: 440px; max-height: 82vh; overflow-y: auto; animation: fadeIn 0.2s ease; }

  .spinner { width: 40px; height: 40px; border: 3px solid rgba(52,211,153,0.2); border-top-color: #34d399; border-radius: 50%; animation: spin 0.8s linear infinite; }

<script>

    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }

}
async function sbPost(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },

// Fire-and-forget engagement logging. Never blocks UI; failures are silent.
let __appOpenLogged = false;
function logEvent(event, metadata = null) {
  if (!state.viewerPlayerId) return;
  fetch(`${SUPABASE_URL}/rest/v1/app_events`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify({ player_id: state.viewerPlayerId, event, metadata })
  }).catch(() => {});
}

async function callGetPredictions(player_id, pin) {
  const r = await fetch(`${SUPABASE_URL}/functions/v1/get-predictions`, {
    method: "POST",
    headers: { "Content-Type": "application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
    body: JSON.stringify({ player_id, pin })
  });
  if (r.status === 401) throw new Error("invalid_pin");
  if (!r.ok) throw new Error("Erro ao obter prognósticos");
  return r.json();
}

// ─── SCORING ─────────────────────────────────────────────────────────
function calcPts(pred, m) {
  if (!pred || m.score_a === null || m.score_b === null) return null;
  const pO = pred.score_a > pred.score_b ? "A" : pred.score_a < pred.score_b ? "B" : "D";
  const rO = m.score_a > m.score_b ? "A" : m.score_a < m.score_b ? "B" : "D";
  let p = 0;
  if (pO !== rO) p += (pO === "D" || rO === "D") ? 3 : 5;
  p += Math.abs(m.score_a - pred.score_a) + Math.abs(m.score_b - pred.score_b);
  return p;
}
function isExact(pred, m) {
  return pred && m.score_a !== null && pred.score_a === m.score_a && pred.score_b === m.score_b;
}
function badgeColor(pts) {
  if (pts === 0) return "#3b82f6";
  if (pts <= 3) return "#34d399";
  if (pts <= 6) return "#fbbf24";
  if (pts <= 9) return "#fb923c";
  return "#ef4444";
}

const TERMINAL_STATUSES = new Set(['finished', 'pen-home', 'pen-away']);
function isFinal(m) { return TERMINAL_STATUSES.has(m.status); }
function isLive(m) { return m.status === 'live'; }

function tournamentStarted() {
  const now = Date.now();
  return state.matches.some(m =>
    new Date(m.kickoff).getTime() <= now || m.score_a !== null || isLive(m) || isFinal(m)
  );
}

function matchWinner(m) {
  if (!isFinal(m)) return null;
  if (m.score_a === null) return null;
  if (m.score_a > m.score_b) return m.team_a;
  if (m.score_b > m.score_a) return m.team_b;
  if (m.status === 'pen-home') return m.team_a;
  if (m.status === 'pen-away') return m.team_b;
  return null;
}

function calcPodiumSlotPts(slotIndex, predicted, tournamentState) {
  if (!tournamentState?.groupStageComplete) return null;
  const { champion, runnerUp, third, eliminated } = tournamentState;
  const actual = [champion, runnerUp, third];
  if (!predicted) return 20;
  if (eliminated.has(predicted)) return 20;
  if (actual[slotIndex] !== null) {
    if (predicted === actual[slotIndex]) return 0;
    if (actual.filter(Boolean).includes(predicted)) return 10;
    return 20;
  }
  return null; // team still in tournament, position unknown — don't score yet
}

function calcPodiumPts(podiumArr, tournamentState) {
  if (!tournamentState?.groupStageComplete) return null;
  let pts = 0, hasAnyScore = false;
  for (let i = 0; i < 3; i++) {
    const slotPts = calcPodiumSlotPts(i, podiumArr[i], tournamentState);
    if (slotPts !== null) { pts += slotPts; hasAnyScore = true; }
  }
  return hasAnyScore ? pts : null;
}

// ─── FLAGS ───────────────────────────────────────────────────────────
const FLAGS = {
  'Brasil':'🇧🇷','Argentina':'🇦🇷','Colômbia':'🇨🇴','Uruguai':'🇺🇾','Equador':'🇪🇨',

  'Portugal':'🇵🇹','Países Baixos':'🇳🇱','Bélgica':'🇧🇪','Itália':'🇮🇹',

  'Polónia':'🇵🇱','Escócia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Turquia':'🇹🇷','Sérvia':'🇷🇸',
  'Noruega':'🇳🇴','Suécia':'🇸🇪','Rep. Checa':'🇨🇿','Hungria':'🇭🇺',
  'Eslováquia':'🇸🇰','Eslovénia':'🇸🇮','Albânia':'🇦🇱','Grécia':'🇬🇷',

  'Bósnia-Herzegovina':'🇧🇦','País de Gales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','Finlândia':'🇫🇮','Irlanda':'🇮🇪',
  'Japão':'🇯🇵','Coreia do Sul':'🇰🇷','Austrália':'🇦🇺','Irão':'🇮🇷',

  'Jordânia':'🇯🇴','China':'🇨🇳','Indonésia':'🇮🇩','Palestina':'🇵🇸',
  'Marrocos':'🇲🇦','Senegal':'🇸🇳','Egito':'🇪🇬','Nigéria':'🇳🇬',
  'Argélia':'🇩🇿','África do Sul':'🇿🇦','Gana':'🇬🇭','Costa do Marfim':'🇨🇮',
  'Cabo Verde':'🇨🇻','RD Congo':'🇨🇩','Camarões':'🇨🇲','Mali':'🇲🇱',
  'Tunísia':'🇹🇳','Angola':'🇦🇴','Guiné':'🇬🇳','Zâmbia':'🇿🇲',
  'Comores':'🇰🇲','Ruanda':'🇷🇼','Namíbia':'🇳🇦','Burquina Faso':'🇧🇫',
  'Benin':'🇧🇯','Mauritânia':'🇲🇷','Guiné-Bissau':'🇬🇼','Togo':'🇹🇬',
  'Etiópia':'🇪🇹','Moçambique':'🇲🇿','Nova Zelândia':'🇳🇿','Fiji':'🇫🇯',
};
function flagOf(team) { return FLAGS[team] || ''; }
function teamWithFlag(team) { const f = flagOf(team); return (team && f) ? `${f} ${team}` : (team || ''); }

function playerLabel(p, short = false) {
  const text = short ? (p.short_name || p.name.split(" ")[0]) : p.name;
  return p.is_observer ? `👀 ${text}` : text;
}

function slugOf(p) { return p.short_name || p.name.replace(/\s+/g, "_").slice(0, 8).toUpperCase(); }
function slugLabel(p) { return p.is_observer ? `👀 ${slugOf(p)}` : slugOf(p); }

// Playing players first, observers after — each block alphabetical. For surfaces with no
// natural ranking (dropdown, audit export); the leaderboard does its own ranked split.
function playersThenObservers(players) {
  const byName = (a, b) => slugOf(a).localeCompare(slugOf(b), "pt");
  return [...players.filter(p => !p.is_observer).sort(byName),
          ...players.filter(p => p.is_observer).sort(byName)];
}

// ─── FORMATTING ──────────────────────────────────────────────────────
// Bare timestamps from DB (no tz suffix) are UTC — force Z so they aren't
// misread as local time when the browser is not in UTC.
const PT_TZ = 'Europe/Lisbon';
function parseAsUTC(iso) {
  return (!iso.endsWith('Z') && !/[+\-]\d{2}:?\d{2}$/.test(iso))
    ? new Date(iso.replace(' ', 'T') + 'Z') : new Date(iso);
}
function fmtShort(iso) {
  const d = parseAsUTC(iso);
  const p = new Intl.DateTimeFormat('pt-PT', { timeZone: PT_TZ, day: '2-digit', month: '2-digit' }).formatToParts(d);
  return `${p.find(x => x.type === 'day').value}/${p.find(x => x.type === 'month').value}`;
}
function fmtTime(iso) {
  const d = parseAsUTC(iso);
  return new Intl.DateTimeFormat('pt-PT', { timeZone: PT_TZ, hour: '2-digit', minute: '2-digit', hour12: false }).format(d);
}
function fmtDate(iso) {
  const wd = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const d = parseAsUTC(iso);
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(
    new Intl.DateTimeFormat('en-US', { timeZone: PT_TZ, weekday: 'short' }).format(d)
  );
  return `${wd[dow]} ${fmtShort(iso)} ${fmtTime(iso)}`;
}

// Lock/reveal banner shared by the Prognósticos and Fase Final tabs (see
// specifications/_archive/lock-and-reveal-gates.md). Three states:
//   pre-lock                 → amber countdown to the submission deadline
//   locked, pre-reveal       → red "Prazo encerrado" + when everyone's picks reveal
//   post-reveal              → red "Prazo encerrado" alone
function renderLockBanner() {
  if (state.lockPassed) {
    const revealLine = (!state.revealPassed && state.revealAt)
      ? h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginTop: "4px" } },
          `Os prognósticos de todos serão revelados no início do torneio (${fmtShort(state.revealAt.toISOString())} ${fmtTime(state.revealAt.toISOString())}).`)
      : null;
    return h("div", { className: "deadline-banner" },
      h("div", { style: { fontSize: "14px", fontWeight: 700, color: "#ef4444" } }, "⏰ Prazo encerrado"),
      revealLine
    );
  }
  return state.lockDeadline
    ? h("div", { style: { background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.15)", borderRadius: "12px", padding: "10px 16px", marginBottom: "16px", textAlign: "center" } },
        h("div", { style: { fontSize: "12px", color: "rgba(251,191,36,0.8)" } }, "⏰ Prazo: " + fmtDate(state.lockDeadline.toISOString())))
    : null;
}

let chartInstances = { main: null };

const PLAYER_COLORS = ["#34d399","#06b6d4","#f59e0b","#f472b6","#a78bfa","#fb923c","#60a5fa","#e2e8f0"];

function buildChart(canvasId, players, instanceKey) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[instanceKey]) { chartInstances[instanceKey].destroy(); chartInstances[instanceKey] = null; }
  if (players.length === 0) return;

  const played = state.matches
    .filter(m => m.score_a !== null)
    .sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));

  const dates = [...new Set(played.map(m => m.kickoff.split("T")[0]))].sort();

  const datasets = players.map((p, i) => {
    let cumulative = 0;
    const data = dates.map(date => {
      played.filter(m => m.kickoff.startsWith(date)).forEach(m => {
        const pts = calcPts(state.allPreds[p.id]?.[m.id], m);
        if (pts !== null) cumulative += pts;
      });
      return cumulative;
    });
    return {
      label: playerLabel(p, true),
      data,
      borderColor: PLAYER_COLORS[i % PLAYER_COLORS.length],
      backgroundColor: "transparent",
      borderWidth: 2,
      borderDash: p.is_observer ? [5, 4] : undefined,
      pointRadius: 3,
      tension: 0.3
    };
  });

  // Dinner-cutoff band: shade from rank T+1 (first to pay) upward, per day,
  // among non-observers only (see leaderboard-chart-unified-and-cutoff-band.md)
  const compSeries = datasets.filter((_, i) => !players[i].is_observer).map(d => d.data);
  const N = compSeries.length;
  const T = Math.floor(N / 2);
  if (N >= 2) {
    const cutoff = dates.map((_, day) => {
      const vals = compSeries.map(s => s[day]).sort((a, b) => a - b);
      return vals[T];
    });
    datasets.push({
      label: "__cutoff__",
      data: cutoff,
      borderWidth: 0,
      pointRadius: 0,
      fill: "end",
      backgroundColor: "rgba(239,68,68,0.10)",
      order: 99
    });
  }

  chartInstances[instanceKey] = new Chart(canvas, {
    type: "line",
    data: {
      labels: dates.map(d => { const [,m,day] = d.split("-"); return `${day}/${m}`; }),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: "rgba(255,255,255,0.6)", font: { size: 11, family: "'DM Sans', sans-serif" }, boxWidth: 12, padding: 10, filter: item => item.text !== "__cutoff__" }
        },
        tooltip: { mode: "index", intersect: false }
      },
      scales: {
        x: {
          ticks: { color: "rgba(255,255,255,0.4)", font: { size: 10 } },
          grid: { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          ticks: { color: "rgba(255,255,255,0.4)", font: { size: 10 } },
          grid: { color: "rgba(255,255,255,0.04)" },
          title: { display: true, text: "Pontos", color: "rgba(255,255,255,0.3)", font: { size: 10 } }
        }
      }
    }
  });
}

// ─── DATA LOADING ────────────────────────────────────────────────────
async function loadData(silent = false) {
  if (!silent) setState({ loading: true, error: null });
  else setState({ error: null });
  try {
    const [players, matches, config] = await Promise.all([
      sbGet("players", "select=id,name,short_name,is_observer&order=name"),
      sbGet("matches", "order=kickoff"),
      sbGet("tournament_config", "key=in.(submission_deadline,reveal_at,actual_podium)")
    ]);

    // Two independent gates (see specifications/_archive/lock-and-reveal-gates.md):
    //   lock   = submission_deadline — edits close, visibility unchanged
    //   reveal = reveal_at           — everyone's picks become public, PIN no longer required
    const now = new Date();
    let lockDeadline = null, lockPassed = false;
    const lockCfg = config.find(c => c.key === 'submission_deadline');
    if (lockCfg) { lockDeadline = new Date(lockCfg.value); lockPassed = now > lockDeadline; }
    let revealAt = null, revealPassed = false;
    const revealCfg = config.find(c => c.key === 'reveal_at');
    if (revealCfg) { revealAt = new Date(revealCfg.value); revealPassed = now > revealAt; }
    let actualPodium = null;
    const podiumCfg = config.find(c => c.key === 'actual_podium');
    if (podiumCfg) { try { actualPodium = JSON.parse(podiumCfg.value); } catch (_) {} }

    let preds = [], podiums = [], brackets = [];
    if (revealPassed) {
      // Post-reveal: fetch everyone's picks directly, no auth needed
      [preds, podiums, brackets] = await Promise.all([
        sbGet("predictions", "select=*"),
        sbGet("podium_predictions", "select=*"),
        sbGet("bracket_predictions", "select=*")
      ]);
    } else if (state.viewerPlayerId && state.viewerPin) {
      // Pre-reveal, already authenticated: re-fetch own data via edge function (own-only)
      const data = await callGetPredictions(state.viewerPlayerId, state.viewerPin);
      preds = data.predictions; podiums = data.podiums; brackets = data.brackets;
    }
    // else: pre-reveal, not yet authenticated — preds/podiums/brackets stay empty; identity flow triggered below

    const predMap = {};
    preds.forEach(p => { if (!predMap[p.player_id]) predMap[p.player_id] = {}; predMap[p.player_id][p.match_id] = p; });
    const podMap = {};
    podiums.forEach(p => { podMap[p.player_id] = p; });
    const bracketMap = {};
    brackets.forEach(b => { if (!bracketMap[b.player_id]) bracketMap[b.player_id] = {}; bracketMap[b.player_id][`${b.round}-${b.slot}`] = b.picked_team; });

    // Pre-reveal: currentPlayer is always the PIN-verified viewer.
    // Post-reveal: default to the remembered player (their pre-reveal identity, or the
    // last one they manually selected) so everyone but GON isn't forced to re-pick on every visit.
    const storedViewId = parseInt(localStorage.getItem('goalgut_player_id') || '', 10);
    const cp = (!revealPassed && state.viewerPlayerId)
      ? (players.find(p => p.id === state.viewerPlayerId) || players[0] || null)
      : (state.currentPlayer
         || (storedViewId && players.find(p => p.id === storedViewId))
         || players[0] || null);

    const myPreds = predMap[cp?.id] || {};
    const myPodium = podMap[cp?.id];
    const editPreds = {};
    matches.forEach(m => { editPreds[m.id] = myPreds[m.id] ? { score_a: myPreds[m.id].score_a, score_b: myPreds[m.id].score_b } : { score_a: 0, score_b: 0 }; });

    setState({
      players, matches, allPreds: predMap, allPodiums: podMap, allBrackets: bracketMap, currentPlayer: cp,
      editPreds, editPodium: myPodium ? [myPodium.first_place, myPodium.second_place, myPodium.third_place] : ["","",""],
      editBracket: bracketMap[cp?.id] || {},
      tiebreaks: {},
      submitted: Object.keys(myPreds).length > 0, loading: false,
      lockDeadline, lockPassed, revealAt, revealPassed, actualPodium,
      authenticated: revealPassed || state.authenticated,
      hasBracket: !!podMap[cp?.id], bracketStale: false, predictionsEdited: false,
      submittedAt: Object.keys(myPreds).length > 0 ? (state.submittedAt || new Date(0)) : null
    });

    // Show identity flow if pre-reveal and not yet authenticated (PIN gate persists through the lock→reveal window)
    if (!revealPassed && !state.viewerPlayerId) initiateIdentityFlow();

    // Fire app_open once per page-load, after we know who the viewer is.
    if (state.viewerPlayerId && !__appOpenLogged) {
      __appOpenLogged = true;
      logEvent('app_open');
    }
  } catch (e) { setState({ error: e.message, loading: false }); }
}

function switchPlayer(p) {
  // Post-reveal, remember the viewed player so it survives reloads (no PIN flow to set this).
  // Pre-reveal, goalgut_player_id is the PIN identity — don't clobber it just from viewing.
  if (state.revealPassed) localStorage.setItem('goalgut_player_id', String(p.id));
  const myPreds = state.allPreds[p.id] || {};
  const myPodium = state.allPodiums[p.id];
  const editPreds = {};
  state.matches.forEach(m => { editPreds[m.id] = myPreds[m.id] ? { score_a: myPreds[m.id].score_a, score_b: myPreds[m.id].score_b } : { score_a: 0, score_b: 0 }; });
  setState({
    currentPlayer: p, dropdownOpen: false, editPreds,
    editPodium: myPodium ? [myPodium.first_place, myPodium.second_place, myPodium.third_place] : ["","",""],
    editBracket: state.allBrackets[p.id] || {},
    tiebreaks: {},
    submitted: Object.keys(myPreds).length > 0,
    hasBracket: !!state.allPodiums[p.id], bracketStale: false, predictionsEdited: false,
    submittedAt: null
  });
}

function initiateIdentityFlow() {
  const storedId = localStorage.getItem('goalgut_player_id');
  if (storedId) {
    const player = state.players.find(p => p.id === parseInt(storedId));
    if (player) { requestBootPin(player); return; }
    localStorage.removeItem('goalgut_player_id');
  }
  setState({ identityModalOpen: true });
}

function requestBootPin(player, showError = false) {
  setState({
    showPinModal: true, pinValue: "", pinError: showError,
    bootPinPlayerName: player.name,
    pinCancelCallback: () => setState({ identityModalOpen: true }),
    pinCallback: async (pin) => {
      try {
        await callGetPredictions(player.id, pin); // verify only; loadData will re-fetch
        localStorage.setItem('goalgut_player_id', String(player.id));
        state.viewerPlayerId = player.id;
        state.viewerPin = pin;
        state.authenticated = true;
        state.bootPinPlayerName = null;
        if (!localStorage.getItem(`goalgut_pin_set_${player.id}`)) state.showChangePinPrompt = true;
        await loadData(true);
      } catch (e) {
        if (e.message === "invalid_pin") requestBootPin(player, true);
        else alert("Erro: " + e.message);
      }
    }
  });
}

async function submitPredictions() {
  if (state.submitting) return;
  if (state.lockPassed) { alert("O prazo para submissão já passou!"); return; }
  if (state.hasBracket && state.predictionsEdited) {
    if (!confirm("Editaste os prognósticos após submeter a Fase Final. Ao resubmeter, o quadro ficará desatualizado — terás de refazer a Fase Final. Continuar?")) return;
  }
  requestPin(async (pin) => {
    setState({ submitting: true });
    const hadBracket = state.hasBracket;
    try {
      const predictions = Object.entries(state.editPreds).map(([mid, p]) => ({
        player_id: state.currentPlayer.id, match_id: parseInt(mid), score_a: p.score_a, score_b: p.score_b
      }));
      const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-predictions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ player_id: state.currentPlayer.id, pin, predictions, podium: null })
      });
      const data = await res.json();
      if (!res.ok) {
        alert(res.status === 401 ? "Código incorrecto. Por favor tenta novamente." : "Erro: " + (data.error || res.status));
        setState({ submitting: false });
        return;
      }
      await loadData(true);
      state.submitting = false;
      state.submittedAt = new Date();
      if (hadBracket) { state.bracketStale = true; }
      render();
      logEvent('preds_submit', { count: predictions.length });
    } catch (e) { alert("Erro: " + e.message); setState({ submitting: false }); }
  });
}

// FIFA WC2026 knockout bracket — fixed structure, no redraw
// R32 matchups sourced from official FIFA competition regulations
const R32 = [
  { slot:0,  a:{type:'runnerup',group:'A'}, b:{type:'runnerup',group:'B'} },
  { slot:1,  a:{type:'winner', group:'E'}, b:{type:'third',groups:['A','B','C','D','F']} },
  { slot:2,  a:{type:'winner', group:'F'}, b:{type:'runnerup',group:'C'} },
  { slot:3,  a:{type:'winner', group:'C'}, b:{type:'runnerup',group:'F'} },
  { slot:4,  a:{type:'winner', group:'I'}, b:{type:'third',groups:['C','D','F','G','H']} },
  { slot:5,  a:{type:'runnerup',group:'E'}, b:{type:'runnerup',group:'I'} },
  { slot:6,  a:{type:'winner', group:'A'}, b:{type:'third',groups:['C','E','F','H','I']} },
  { slot:7,  a:{type:'winner', group:'L'}, b:{type:'third',groups:['E','H','I','J','K']} },
  { slot:8,  a:{type:'winner', group:'D'}, b:{type:'third',groups:['B','E','F','I','J']} },
  { slot:9,  a:{type:'winner', group:'G'}, b:{type:'third',groups:['A','E','H','I','J']} },
  { slot:10, a:{type:'runnerup',group:'K'}, b:{type:'runnerup',group:'L'} },
  { slot:11, a:{type:'winner', group:'H'}, b:{type:'runnerup',group:'J'} },
  { slot:12, a:{type:'winner', group:'B'}, b:{type:'third',groups:['E','F','G','I','J']} },
  { slot:13, a:{type:'winner', group:'J'}, b:{type:'runnerup',group:'H'} },
  { slot:14, a:{type:'winner', group:'K'}, b:{type:'third',groups:['D','E','I','J','L']} },
  { slot:15, a:{type:'runnerup',group:'D'}, b:{type:'runnerup',group:'G'} },
];
const R16 = [
  { slot:0, a:{from:'r32',slot:1},  b:{from:'r32',slot:4}  },
  { slot:1, a:{from:'r32',slot:0},  b:{from:'r32',slot:2}  },
  { slot:2, a:{from:'r32',slot:3},  b:{from:'r32',slot:5}  },
  { slot:3, a:{from:'r32',slot:6},  b:{from:'r32',slot:7}  },
  { slot:4, a:{from:'r32',slot:10}, b:{from:'r32',slot:11} },
  { slot:5, a:{from:'r32',slot:8},  b:{from:'r32',slot:9}  },
  { slot:6, a:{from:'r32',slot:13}, b:{from:'r32',slot:15} },
  { slot:7, a:{from:'r32',slot:12}, b:{from:'r32',slot:14} },
];
const QF = [
  { slot:0, a:{from:'r16',slot:0}, b:{from:'r16',slot:1} },
  { slot:1, a:{from:'r16',slot:4}, b:{from:'r16',slot:5} },
  { slot:2, a:{from:'r16',slot:2}, b:{from:'r16',slot:3} },
  { slot:3, a:{from:'r16',slot:6}, b:{from:'r16',slot:7} },
];
const SF = [
  { slot:0, a:{from:'qf',slot:0}, b:{from:'qf',slot:1} },
  { slot:1, a:{from:'qf',slot:2}, b:{from:'qf',slot:3} },
];
const BRACKET_STRUCTURE = [
  { id:'r32',   label:'Ronda de 32',      matches: R32   },
  { id:'r16',   label:'Oitavos de Final', matches: R16   },
  { id:'qf',    label:'Quartos de Final', matches: QF    },
  { id:'sf',    label:'Meias-Final',      matches: SF    },
  { id:'third', label:'3º Lugar',         matches: [{ slot:0, a:{from:'sf',slot:0,loser:true}, b:{from:'sf',slot:1,loser:true} }] },
  { id:'final', label:'Final',            matches: [{ slot:0, a:{from:'sf',slot:0}, b:{from:'sf',slot:1} }] },
];

// Unified standings computation — getScore(m) returns { sa, sb } (null sa = skip)
function computeStandings(matches, getScore) {
  const groups = {};
  matches.forEach(m => {
    if (!m.group_letter || m.group_letter.length !== 1) return;
    if (!groups[m.group_letter]) groups[m.group_letter] = {};
    [m.team_a, m.team_b].forEach(t => {
      if (!groups[m.group_letter][t]) groups[m.group_letter][t] = { team: t, pts: 0, gd: 0, gf: 0, played: 0 };
    });
    const { sa, sb } = getScore(m);
    if (sa === null) return;
    const g = groups[m.group_letter];
    g[m.team_a].played++; g[m.team_b].played++;
    g[m.team_a].gf += sa; g[m.team_a].gd += (sa - sb);
    g[m.team_b].gf += sb; g[m.team_b].gd += (sb - sa);
    if (sa > sb) g[m.team_a].pts += 3;
    else if (sb > sa) g[m.team_b].pts += 3;
    else { g[m.team_a].pts++; g[m.team_b].pts++; }
  });
  const result = {};
  Object.entries(groups).forEach(([grp, teams]) => {
    result[grp] = Object.values(teams).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  });
  return result;
}

// Derives actual tournament state from real match results.
// Knockout matches are seeded via seed-knockout.js after group stage ends.
// "Eliminated" means a team can no longer finish on the podium (4th or worse) —
// it locks a podium pick to 20 before the final positions are known.
// `asOf` (ms) computes the state *as it stood* at a past instant — counting only matches
// that had kicked off before the cutoff. Defaults to now (Infinity = every match).
function computeActualTournamentState(asOf = Infinity) {
  const inWindow = m => parseAsUTC(m.kickoff).getTime() < asOf;
  const eliminated = new Set();
  let champion = null, runnerUp = null, third = null;

  const groupMatches = state.matches.filter(m => m.group_letter && m.group_letter.length === 1 && inWindow(m));
  const groupStageComplete = groupMatches.length >= 72 && groupMatches.every(m => isFinal(m));
  if (!groupStageComplete) return { champion, runnerUp, third, eliminated, groupStageComplete: false };

  // Rule 1 — group non-qualifiers. The seeded R32 is the factual record of who advanced;
  // any group-stage team absent from it is out. Guarded on a full R32 (16 matches) so a
  // partial seed never flags a real qualifier. (Beats re-deriving FIFA's best-8-thirds in JS.)
  const r32 = state.matches.filter(m => m.group_letter === 'R32' && inWindow(m));
  if (r32.length >= 16) {
    const qualified = new Set();
    r32.forEach(m => { if (m.team_a) qualified.add(m.team_a); if (m.team_b) qualified.add(m.team_b); });
    const groupTeams = new Set();
    groupMatches.forEach(m => { groupTeams.add(m.team_a); groupTeams.add(m.team_b); });
    groupTeams.forEach(t => { if (!qualified.has(t)) eliminated.add(t); });
  }

  // Rule 2 — knockout losers. SF is excluded (loser drops to the 3rd-place match, can still
  // take bronze); the final's loser is the runner-up (on the podium) — so neither is eliminated.
  ['R32', 'R16', 'QF'].forEach(stage => {
    state.matches.filter(m => m.group_letter === stage && inWindow(m)).forEach(m => {
      const w = matchWinner(m);
      if (w) eliminated.add(w === m.team_a ? m.team_b : m.team_a);
    });
  });

  // 3rd place match: winner = third (podium), loser eliminated (4th)
  const thirdMatch = state.matches.find(m => m.group_letter === '3P' && inWindow(m));
  if (thirdMatch) {
    const w = matchWinner(thirdMatch);
    if (w) { third = w; eliminated.add(w === thirdMatch.team_a ? thirdMatch.team_b : thirdMatch.team_a); }
  }

  // Final: winner = champion, loser = runner-up (both on the podium, neither eliminated)
  const finalMatch = state.matches.find(m => m.group_letter === 'F' && inWindow(m));
  if (finalMatch) {
    const w = matchWinner(finalMatch);
    if (w) { champion = w; runnerUp = w === finalMatch.team_a ? finalMatch.team_b : finalMatch.team_a; }
  }

  // Fallback: manual actual_podium from tournament_config (covers PEN edge cases).
  // Current state only — never back-applied to a historical cutoff.
  if (asOf === Infinity && !champion && state.actualPodium?.first_place) {
    champion = state.actualPodium.first_place;
    runnerUp = state.actualPodium.second_place;
    third = third || state.actualPodium.third_place;
  }

  return { champion, runnerUp, third, eliminated, groupStageComplete: true };
}

// ─── GAME-DAY POSITION CHANGES ───────────────────────────────────────
// A "game day" runs 09:00 Lisbon → 09:00 Lisbon so a full night of matches is one day
// (the slate runs over the European night; 07:00–18:00 Lisbon is the dead zone). The whole
// tournament is in Lisbon summer time (WEST = UTC+1), so the rollover is a constant 08:00 UTC.
const GAME_DAY_ROLLOVER_UTC_HOUR = 8;
const koMs = m => parseAsUTC(m.kickoff).getTime();

// The 09:00-Lisbon instant that opens the game day a given time belongs to.
function gameDayStart(ms) {
  const d = new Date(ms);
  const boundary = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), GAME_DAY_ROLLOVER_UTC_HOUR);
  return ms >= boundary ? boundary : boundary - 24 * 3600 * 1000;
}

// The most recent *completed* game day that actually had finished matches (empty days skipped).
function lastCompletedGameDay(now) {
  const starts = [...new Set(state.matches.filter(isFinal).map(m => gameDayStart(koMs(m))))]
    .filter(start => now >= start + 24 * 3600 * 1000)   // window fully closed
    .sort((a, b) => a - b);
  if (!starts.length) return null;
  const A = starts[starts.length - 1];
  // Need a real prior standing: skip the very first game day (baseline would be everyone at 0).
  if (!state.matches.some(m => isFinal(m) && koMs(m) < A)) return null;
  return { A, B: A + 24 * 3600 * 1000 };
}

// Standings as they stood at `cutoff` (ms): counts matches finished with kickoff < cutoff,
// plus podium points from the tournament state as of that cutoff. Derived, not stored.
function standingsAsOf(cutoff) {
  const ts = computeActualTournamentState(cutoff);
  return state.players.map(p => {
    let total = 0, exacts = 0;
    state.matches.forEach(m => {
      if (!isFinal(m) || koMs(m) >= cutoff) return;
      const pred = state.allPreds[p.id]?.[m.id];
      const pts = calcPts(pred, m);
      if (pts !== null) { total += pts; if (isExact(pred, m)) exacts++; }
    });
    const pod = state.allPodiums[p.id];
    const podiumArr = pod ? [pod.first_place, pod.second_place, pod.third_place] : ["", "", ""];
    const podiumPts = calcPodiumPts(podiumArr, ts);
    if (podiumPts !== null) total += podiumPts;
    return { id: p.id, name: p.name, is_observer: p.is_observer, total, exacts };
  });
}

// Ranks (per pool) and dinner-half (non-observers) as of a cutoff.
function boardAsOf(cutoff) {
  const rows = standingsAsOf(cutoff).sort((a, b) => a.total - b.total || b.exacts - a.exacts);
  const main = rows.filter(p => !p.is_observer);
  const obs = rows.filter(p => p.is_observer);
  const rankById = new Map();
  main.forEach((p, i) => rankById.set(p.id, i + 1));
  obs.forEach((p, i) => rankById.set(p.id, i + 1));
  const N = main.length, T = Math.floor(N / 2);
  const halfById = new Map();
  main.forEach((p, i) => halfById.set(p.id, N >= 2 ? ((i + 1) <= T ? "top" : "bottom") : "neutral"));
  return { rankById, halfById, main, obs };
}

// The "Desde [data]" highlight reel for the last completed game day — prioritised, capped at 5.
function gameDayFacts(gd, bA, bB) {
  const facts = [];
  const nameOf = id => state.players.find(p => p.id === id)?.name || "?";
  const main = bB.main; // non-observers, ranked as of B

  // 1. Lead change
  if (bA.main[0] && bB.main[0] && bA.main[0].id !== bB.main[0].id)
    facts.push({ p: 1, emoji: "👑", text: `Novo líder: ${nameOf(bB.main[0].id)}` });

  // 2. Biggest climber / faller (positive delta = climbed)
  const deltas = main.filter(p => bA.rankById.get(p.id) != null)
    .map(p => ({ id: p.id, d: bA.rankById.get(p.id) - bB.rankById.get(p.id) }));
  const up = deltas.filter(x => x.d > 0).sort((a, b) => b.d - a.d)[0];
  const down = deltas.filter(x => x.d < 0).sort((a, b) => a.d - b.d)[0];
  if (up) facts.push({ p: 2, emoji: "🚀", text: `Maior subida: ${nameOf(up.id)} subiu ${up.d} lugar${up.d > 1 ? "es" : ""}` });
  if (down) facts.push({ p: 2, emoji: "😬", text: `Maior queda: ${nameOf(down.id)} caiu ${-down.d}` });

  // 3. Podium hits — teams newly out this game day that sit in someone's podium
  const tsA = computeActualTournamentState(gd.A), tsB = computeActualTournamentState(gd.B);
  [...tsB.eliminated].filter(t => !tsA.eliminated.has(t)).forEach(team => {
    const hit = state.players.filter(p => !p.is_observer).filter(p => {
      const pod = state.allPodiums[p.id];
      return pod && [pod.first_place, pod.second_place, pod.third_place].includes(team);
    }).map(p => p.name);
    if (hit.length === 1) facts.push({ p: 3, emoji: "☠️", text: `O pódio de ${hit[0]} levou um golpe — ${team} eliminado (+20)` });
    else if (hit.length > 1) facts.push({ p: 3, emoji: "☠️", text: `${team} eliminado — atinge o pódio de ${hit.length} jogadores (+20)` });
  });

  // 4. Overtakes — most significant
  const overtakes = [];
  main.forEach(x => main.forEach(y => {
    if (x.id === y.id) return;
    const xa = bA.rankById.get(x.id), ya = bA.rankById.get(y.id), xb = bB.rankById.get(x.id), yb = bB.rankById.get(y.id);
    if (xa != null && ya != null && xa > ya && xb < yb) overtakes.push({ x: x.id, y: y.id, gain: xa - xb });
  }));
  overtakes.sort((a, b) => b.gain - a.gain).slice(0, 2).forEach(o =>
    facts.push({ p: 4, emoji: "🔁", text: `${nameOf(o.x)} ultrapassou ${nameOf(o.y)}` }));

  // 5. Exact results during the window
  const windowExacts = [];
  state.matches.filter(m => isFinal(m) && koMs(m) >= gd.A && koMs(m) < gd.B).forEach(m => {
    state.players.filter(p => !p.is_observer).forEach(p => {
      if (isExact(state.allPreds[p.id]?.[m.id], m))
        windowExacts.push(`${p.name} acertou: ${m.team_a} ${m.score_a}-${m.score_b} ${m.team_b}`);
    });
  });
  windowExacts.slice(0, 2).forEach(t => facts.push({ p: 5, emoji: "🎯", text: t }));

  // 6. Dinner-zone crossings
  main.forEach(p => {
    const ha = bA.halfById.get(p.id), hb = bB.halfById.get(p.id);
    if ((ha === "top" || ha === "bottom") && (hb === "top" || hb === "bottom") && ha !== hb)
      facts.push({ p: 6, emoji: "🍽️", text: hb === "bottom" ? `${nameOf(p.id)} entrou na zona que paga o jantar` : `${nameOf(p.id)} saiu da zona que paga o jantar` });
  });

  return facts.sort((a, b) => a.p - b.p).slice(0, 5);
}

// ─── PREDICTED STANDINGS ─────────────────────────────────────────────
function computePredictedStandings(editPreds, matches) {
  return computeStandings(matches, m => {
    const pred = editPreds[m.id];
    return { sa: pred ? (pred.score_a ?? 0) : 0, sb: pred ? (pred.score_b ?? 0) : 0 };
  });
}

function applyTiebreaks(standings, tiebreaks) {
  const result = {};
  Object.entries(standings).forEach(([grp, sorted]) => {
    const teams = [...sorted];
    for (let i = 0; i < teams.length - 1; i++) {
      const a = teams[i], b = teams[i + 1];
      if (a.pts === b.pts && a.gd === b.gd && a.gf === b.gf) {
        const key = `${grp}-${i + 1}`;
        if (tiebreaks[key] === b.team) { teams[i] = b; teams[i + 1] = a; }
      }
    }
    result[grp] = teams;
  });
  return result;
}

function detectPendingTies(standings, tiebreaks) {
  const ties = [];
  Object.entries(standings).forEach(([grp, sorted]) => {
    for (let i = 0; i < sorted.length - 1; i++) {
      const a = sorted[i], b = sorted[i + 1];
      if (a.pts === b.pts && a.gd === b.gd && a.gf === b.gf) {
        const key = `${grp}-${i + 1}`;
        const resolved = tiebreaks[key];
        if (!resolved || (resolved !== a.team && resolved !== b.team)) {
          ties.push({ group: grp, pos: i + 1, key, teams: [a.team, b.team] });
        }
      }
    }
  });
  return ties;
}

function computeBest3rds(standings) {
  return Object.entries(standings)
    .map(([grp, sorted]) => sorted[2] ? { team: sorted[2].team, group: grp, pts: sorted[2].pts, gd: sorted[2].gd, gf: sorted[2].gf } : null)
    .filter(Boolean)
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf)
    .slice(0, 8);
}

const THIRD_SLOT_GROUPS = {
  1:  ['A','B','C','D','F'],
  4:  ['C','D','F','G','H'],
  6:  ['C','E','F','H','I'],
  7:  ['E','H','I','J','K'],
  8:  ['B','E','F','I','J'],
  9:  ['A','E','H','I','J'],
  12: ['E','F','G','I','J'],
  14: ['D','E','I','J','L']
};

function assignBest3rdsToSlots(best3rds) {
  const slots = Object.keys(THIRD_SLOT_GROUPS)
    .map(Number)
    .sort((a, b) => THIRD_SLOT_GROUPS[a].length - THIRD_SLOT_GROUPS[b].length);
  const result = {};

  function backtrack(slotIdx, used) {
    if (slotIdx === slots.length) return true;
    const slot = slots[slotIdx];
    const eligible = THIRD_SLOT_GROUPS[slot];
    for (const candidate of best3rds) {
      if (!used.has(candidate.team) && eligible.includes(candidate.group)) {
        result[slot] = candidate.team;
        used.add(candidate.team);
        if (backtrack(slotIdx + 1, used)) return true;
        delete result[slot];
        used.delete(candidate.team);
      }
    }
    return false;
  }

  backtrack(0, new Set());
  return result;
}

function derivePodiumFromBracket(editBracket) {
  const champion = editBracket['final-0'] || "";
  const sf0 = editBracket['sf-0'] || "";
  const sf1 = editBracket['sf-1'] || "";
  const runnerUp = champion && sf0 && sf1 ? (champion === sf0 ? sf1 : sf0) : "";
  const third = editBracket['third-0'] || "";
  return [champion, runnerUp, third];
}

// Resolve the actual team (or null) and a display label for a bracket slot descriptor
function resolveTeam(desc, editBracket, standings, best3rds, r32Slot) {
  if (desc.type) {
    const lbl = desc.type === 'winner'   ? `1º Gr.${desc.group}`
              : desc.type === 'runnerup' ? `2º Gr.${desc.group}`
              : `Melhor 3º`;
    if (desc.type === 'third') {
      return { team: best3rds?.[r32Slot] ?? null, label: lbl };
    }
    const grp = standings[desc.group];
    if (!grp) return { team: null, label: lbl };
    if (desc.type === 'winner')   return { team: grp[0]?.team ?? null, label: lbl };
    if (desc.type === 'runnerup') return { team: grp[1]?.team ?? null, label: lbl };
    return { team: null, label: lbl };
  }

  const rlabels = { r32:'R32', r16:'R16', qf:'QF', sf:'SF' };
  const srcKey = `${desc.from}-${desc.slot}`;
  const fallback = `${desc.loser ? 'Perd.' : 'Venc.'} ${rlabels[desc.from]} J${desc.slot+1}`;

  if (desc.loser) {
    const srcRound = BRACKET_STRUCTURE.find(r => r.id === desc.from);
    const srcMatch = srcRound?.matches.find(m => m.slot === desc.slot);
    if (!srcMatch) return { team: null, label: fallback };
    const { team: tA } = resolveTeam(srcMatch.a, editBracket, standings, best3rds, srcMatch.slot);
    const { team: tB } = resolveTeam(srcMatch.b, editBracket, standings, best3rds, srcMatch.slot);
    const winner = editBracket[srcKey];
    const loser = (winner && tA && tB) ? (winner === tA ? tB : tA) : null;
    return { team: loser, label: fallback };
  }

  const winner = editBracket[srcKey];
  return { team: winner || null, label: fallback };
}

function clearDownstream(editBracket, round, slot) {
  const cleared = { ...editBracket };
  const queue = [[round, slot]];
  while (queue.length > 0) {
    const [r, s] = queue.shift();
    BRACKET_STRUCTURE.forEach(roundDef => {
      roundDef.matches.forEach(match => {
        const depends = (match.a?.from === r && match.a?.slot === s)
                     || (match.b?.from === r && match.b?.slot === s);
        if (depends) {
          const k = `${roundDef.id}-${match.slot}`;
          if (cleared[k]) { delete cleared[k]; queue.push([roundDef.id, match.slot]); }
        }
      });
    });
  }
  return cleared;
}

async function submitBracket() {
  if (state.bracketSubmitting) return;
  if (state.lockPassed) { alert("O prazo para submissão já passou!"); return; }
  requestPin(async (pin) => {
    setState({ bracketSubmitting: true });
    try {
      // 1. Submit bracket picks
      const picks = Object.entries(state.editBracket).filter(([, t]) => t);
      const bracket = picks.map(([key, picked_team]) => {
        const parts = key.split("-"); const slot = parseInt(parts.pop()); const round = parts.join("-");
        return { round, slot, picked_team };
      });
      const res1 = await fetch(`${SUPABASE_URL}/functions/v1/submit-bracket`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ player_id: state.currentPlayer.id, pin, bracket })
      });
      const d1 = await res1.json();
      if (!res1.ok) {
        alert(res1.status === 401 ? "Código incorrecto. Por favor tenta novamente." : "Erro: " + (d1.error || res1.status));
        setState({ bracketSubmitting: false });
        return;
      }
      // 2. Save derived podium (re-submits existing predictions + new podium)
      const [fp, sp, tp] = derivePodiumFromBracket(state.editBracket);
      const podium = (fp && sp && tp) ? { first_place: fp, second_place: sp, third_place: tp } : null;
      if (podium) {
        const predictions = Object.entries(state.editPreds).map(([mid, p]) => ({
          player_id: state.currentPlayer.id, match_id: parseInt(mid), score_a: p.score_a, score_b: p.score_b
        }));
        const res2 = await fetch(`${SUPABASE_URL}/functions/v1/submit-predictions`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({ player_id: state.currentPlayer.id, pin, predictions, podium })
        });
        const d2 = await res2.json();
        if (!res2.ok) {
          alert("Erro ao guardar pódio: " + (d2.error || res2.status));
          setState({ bracketSubmitting: false });
          return;
        }
      }
      await loadData(true);
      state.bracketSubmitting = false;
      render();
      logEvent('bracket_submit', { picks: picks.length, with_podium: !!podium });
    } catch (e) { alert("Erro: " + e.message); setState({ bracketSubmitting: false }); }
  });
}

                      render();

          sel.value = picked;

          return h("div", { className: `bracket-match${picked ? " bracket-match--picked" : ""}` },
            h("div", { style: { display: "flex", alignItems: "center", gap: "6px", marginBottom: "8px" } },

                background: (picked === teamA && teamA) ? "#34d399" : "rgba(255,255,255,0.05)"
              }}, teamA ? teamWithFlag(teamA) : labelA),
              h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.2)", fontWeight: 700 } }, "vs"),
              h("span", { style: {
                flex: 1, textAlign: "center", fontSize: "11px", fontWeight: 600, padding: "6px 4px",
                borderRadius: "6px", color: (picked === teamB && teamB) ? "#0f172a" : teamB ? "#fff" : "rgba(255,255,255,0.3)",
                background: (picked === teamB && teamB) ? "#34d399" : "rgba(255,255,255,0.05)"
              }}, teamB ? teamWithFlag(teamB) : labelB)
            ),
            h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
              h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.3)", whiteSpace: "nowrap" } }, "Vencedor:"),
              sel

function navigateTo(newView) {

    if (!confirm("Tens prognósticos por submeter. Se saíres agora, as alterações serão perdidas. Continuar?")) return;

  // Reveal gate (not lock): the PIN/identity modal must keep firing through the lock→reveal window.
  if (!state.revealPassed && !state.authenticated && (newView === "predictions" || newView === "bracket")) {
    setState({ identityModalOpen: true });
    return;
  }
  setState({ view: newView });
  logEvent('tab_view', { tab: newView });
}

// ─── RENDER ──────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else if (k === "disabled") { if (v) el.setAttribute("disabled",""); }
    else if (k === "value") el.value = v;
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return el;
}

function badge(pts, sm) {
  if (pts === null || pts === undefined) return document.createTextNode("");

function renderLeaderboard() {
  const played = state.matches.filter(m => m.score_a !== null);
  const progress = state.matches.length > 0 ? (played.length / state.matches.length) * 100 : 0;
  const tournamentState = computeActualTournamentState();
  const lb = state.players.map(p => {
    let total = 0, scored = 0, exacts = 0;
    played.forEach(m => {
      const pred = state.allPreds[p.id]?.[m.id];
      const pts = calcPts(pred, m);
      if (pts !== null) { total += pts; scored++; if (isExact(pred, m)) exacts++; }
    });
    const pod = state.allPodiums[p.id];
    const podiumArr = pod ? [pod.first_place, pod.second_place, pod.third_place] : ["", "", ""];
    const podiumPts = calcPodiumPts(podiumArr, tournamentState);
    if (podiumPts !== null) total += podiumPts;
    return { ...p, total, scored, exacts, podiumArr, podiumPts };
  }).sort((a, b) => a.total - b.total || b.exacts - a.exacts);

  // Partition by observer status — observers live in their own section (see observer-members.md)
  const mainLb = lb.filter(p => !p.is_observer);
  const obsLb = lb.filter(p => p.is_observer);

  // Dinner-split classification applies only to mainLb (see leaderboard-v0-dinner-split.md)
  const N = mainLb.length;
  const T = Math.floor(N / 2);
  mainLb.forEach((p, i) => { p.dinnerHalf = N >= 2 ? ((i + 1) <= T ? "top" : "bottom") : "neutral"; });
  // Tied across the cutoff: if rank T and T+1 share (total, exacts), neutralise the tied block
  if (T >= 1 && N > T) {
    const a = mainLb[T - 1], b = mainLb[T];
    if (a.total === b.total && a.exacts === b.exacts) {
      let lo = T - 1, hi = T;
      while (lo > 0 && mainLb[lo - 1].total === a.total && mainLb[lo - 1].exacts === a.exacts) lo--;
      while (hi < N - 1 && mainLb[hi + 1].total === a.total && mainLb[hi + 1].exacts === a.exacts) hi++;
      for (let i = lo; i <= hi; i++) mainLb[i].dinnerHalf = "neutral";
    }
  }
  // Post-group-stage: possible-rank range + locked classification (skip when N < 2 — no meaningful dinner split)
  if (tournamentState.groupStageComplete && N >= 2) {
    mainLb.forEach(p => {
      const groupTotal = p.total - (p.podiumPts ?? 0);
      let lockedPP = 0, pending = 0;
      for (let i = 0; i < 3; i++) {
        const team = p.podiumArr[i];
        if (!team || tournamentState.eliminated.has(team)) lockedPP += 20;
        else pending++;
      }
      p.minTotal = groupTotal + lockedPP;
      p.maxTotal = groupTotal + lockedPP + 20 * pending;
    });
    mainLb.forEach(p => {
      const ahead = mainLb.filter(q => q.id !== p.id && q.maxTotal < p.minTotal).length;
      const behind = mainLb.filter(q => q.id !== p.id && q.minTotal > p.maxTotal).length;
      p.bestRank = 1 + ahead;
      p.worstRank = N - behind;
      p.locked = p.worstRank <= T ? "green" : p.bestRank > T ? "red" : null;
    });
  }

  // Game-day position changes + fun facts (see leaderboard-position-changes-and-fun-facts.md).
  // Frozen to the last completed game day (09:00 Lisbon rollover); shared across viewers.
  const gd = lastCompletedGameDay(Date.now());
  const deltaById = new Map();
  let gameFacts = [];
  if (gd) {
    const bA = boardAsOf(gd.A), bB = boardAsOf(gd.B);
    state.players.forEach(p => {
      const ra = bA.rankById.get(p.id), rb = bB.rankById.get(p.id);
      deltaById.set(p.id, (ra != null && rb != null) ? ra - rb : null);
    });
    gameFacts = gameDayFacts(gd, bA, bB);
  }

  const medals = ["🥇","🥈","🥉"];

  const renderLbRow = (p, i, isObserver) => {
    const isTop = !isObserver && i < 3;
    const isExp = state.expanded[p.id];
    const exactMatches = isExp ? played.filter(m => isExact(state.allPreds[p.id]?.[m.id], m)) : [];
    const showMedal = !isObserver && medals[i];
    const delta = deltaById.get(p.id);
    const arrow = delta == null ? null
      : delta > 0 ? { t: "▲" + delta, c: "#10b981" }
      : delta < 0 ? { t: "▼" + (-delta), c: "#ef4444" }
      : { t: "–", c: "rgba(255,255,255,0.3)" };
    const classifClass = isObserver ? "lb-row--observer"
      : p.locked === "green" ? "locked-green"
      : p.locked === "red" ? "locked-red"
      : p.dinnerHalf === "top" ? "half-top"
      : p.dinnerHalf === "bottom" ? "half-bottom"
      : p.dinnerHalf === "neutral" ? "half-neutral"
      : "";
    return h("div", null,
      h("button", { className: `lb-row ${classifClass} ${isTop ? "top" : ""} ${isExp ? "expanded-top" : ""}`, onClick: () => { const e = { ...state.expanded }; e[p.id] = !e[p.id]; setState({ expanded: e }); } },
        h("div", { style: { width: "28px", textAlign: "center" } },
          h("div", { style: { fontSize: showMedal ? "18px" : "14px", fontWeight: 800, color: "rgba(255,255,255,0.3)" } }, showMedal ? medals[i] : String(i + 1)),
          (!isObserver && p.locked) ? h("div", { style: { fontSize: "9px", marginTop: "1px", lineHeight: 1 } }, "🔒") : null,
          arrow ? h("div", { style: { fontSize: "9px", fontWeight: 700, marginTop: "1px", lineHeight: 1, color: arrow.c } }, arrow.t) : null
        ),
        h("div", { style: { flex: 1 } },
          h("div", { style: { fontSize: "14px", fontWeight: 700, color: isTop ? "#fff" : "rgba(255,255,255,0.8)" } }, playerLabel(p)),
          h("div", { style: { fontSize: "11px", color: "rgba(255,255,255,0.35)", marginTop: "1px" } },
            `${p.scored} jogos · `, h("span", { style: { color: p.exacts > 0 ? "#10b981" : "rgba(255,255,255,0.25)" } }, `${p.exacts} exacto${p.exacts !== 1 ? "s" : ""} ${p.exacts > 0 ? "✓" : ""}`)),
          (!isObserver && tournamentState.groupStageComplete && p.bestRank != null) ? h("div", { style: { fontSize: "10px", color: "rgba(255,255,255,0.3)", marginTop: "1px", fontWeight: 600 } },
            p.bestRank === p.worstRank ? `Posição final: #${p.bestRank}` : `Possível: #${p.bestRank} – #${p.worstRank}`
          ) : null
        ),
        h("div", { style: { fontSize: "22px", fontWeight: 900, color: isTop ? "#34d399" : "rgba(255,255,255,0.6)", fontVariantNumeric: "tabular-nums", letterSpacing: "-1px" } }, String(p.total)),
        h("div", { style: { fontSize: "11px", color: "rgba(255,255,255,0.2)" } }, isExp ? "▴" : "▾")
      ),
      isExp ? h("div", { className: `lb-expand ${isTop ? "top" : ""}` },
        exactMatches.length === 0 ? h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.3)", fontStyle: "italic" } }, "Nenhum resultado exacto ainda") :
        h("div", null,
          h("div", { style: { fontSize: "11px", fontWeight: 700, color: "#10b981", marginBottom: "6px", textTransform: "uppercase", letterSpacing: "0.5px" } }, "Resultados exactos"),
          ...exactMatches.map(m => h("div", { style: { display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: "rgba(255,255,255,0.5)", padding: "3px 0" } },
            h("span", { style: { color: "#10b981", fontSize: "10px" } }, "✓"),
            h("span", { style: { fontWeight: 600, color: "rgba(255,255,255,0.7)" } }, teamWithFlag(m.team_a)),
            h("span", { style: { fontWeight: 800, color: "#10b981" } }, `${m.score_a}-${m.score_b}`),
            h("span", { style: { fontWeight: 600, color: "rgba(255,255,255,0.7)" } }, teamWithFlag(m.team_b))
          ))
        ),
        p.podiumArr.some(t => t) ? h("div", { style: { marginTop: "10px", paddingTop: "10px", borderTop: "1px solid rgba(255,255,255,0.05)" } },
          h("div", { style: { fontSize: "11px", fontWeight: 700, color: "rgba(251,191,36,0.7)", marginBottom: "6px", textTransform: "uppercase", letterSpacing: "0.5px" } },
            p.podiumPts !== null ? `Pódio — ${p.podiumPts} pts` : "Pódio previsto"
          ),
          h("div", { style: { display: "flex", gap: "5px" } },
            ...["🥇","🥈","🥉"].map((medal, mi) => {
              const predicted = p.podiumArr[mi];
              const pPts = calcPodiumSlotPts(mi, predicted, tournamentState); // canonical 0 | 10 | 20 | null
              const dotColor = pPts === 0 ? "#10b981" : pPts === 10 ? "#fbbf24" : pPts === 20 ? "#ef4444" : "rgba(255,255,255,0.2)";
              return h("div", { style: { flex: 1, textAlign: "center", padding: "5px 4px", borderRadius: "7px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.05)" } },
                h("div", { style: { fontSize: "11px", marginBottom: "3px" } }, medal),
                h("div", { style: { fontSize: "18px", lineHeight: 1 } }, predicted ? (flagOf(predicted) || predicted) : "—"),
                pPts !== null ? h("div", { style: { fontSize: "10px", fontWeight: 700, color: dotColor, marginTop: "2px" } }, `${pPts}pts`) : null
              );
            })
          )
        ) : null
      ) : null
    );
  };

  return h("div", { className: "content" },
    h("div", { className: "progress-card" },
      h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: "8px" } },
        h("span", { style: { fontSize: "12px", color: "rgba(255,255,255,0.5)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px" } }, "Progresso do Torneio"),
        h("span", { style: { fontSize: "13px", color: "#34d399", fontWeight: 700 } }, `${played.length}/${state.matches.length} jogos`)
      ),
      h("div", { className: "progress-track" }, h("div", { className: "progress-fill", style: { width: progress + "%" } }))
    ),
    h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "14px" } },
      h("h2", { style: { marginBottom: 0 } }, "Classificação"),
      state.lockPassed ? h("button", { onClick: generateAudit, style: { padding: "6px 12px", borderRadius: "8px", border: "1px solid rgba(52,211,153,0.2)", background: "rgba(52,211,153,0.06)", color: "#34d399", fontSize: "11px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" } }, "⬇ Auditoria") : null
    ),
    // Main chart (all players; observers share the chart as dashed lines)
    lb.length > 0 ? h("div", { className: "chart-wrap" },
      h("div", { style: { fontSize: "11px", fontWeight: 700, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "6px" } }, "Pontos Acumulados"),
      N >= 2 ? h("div", { style: { fontSize: "10px", color: "rgba(255,255,255,0.4)", marginBottom: "10px" } },
        "🔴 zona que paga o jantar — abaixo da zona vermelha estás a salvo (observadores 👀 não contam)"
      ) : null,
      played.length < 2
        ? h("div", { style: { textAlign: "center", color: "rgba(255,255,255,0.25)", fontSize: "12px", padding: "20px 0" } }, "Disponível após os primeiros jogos")
        : h("div", { style: { height: "200px", position: "relative" } },
            h("canvas", { id: "points-chart" })
          )
    ) : null,
    // Game-day highlights — "Desde [data]" (position changes + fun facts)
    gd && gameFacts.length > 0 ? h("div", { style: { background: "rgba(52,211,153,0.06)", border: "1px solid rgba(52,211,153,0.15)", borderRadius: "14px", padding: "12px 14px", marginBottom: "20px", animation: "fadeIn 0.3s ease" } },
      h("div", { style: { fontSize: "11px", fontWeight: 700, color: "rgba(255,255,255,0.45)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" } }, `Desde ${fmtShort(new Date(gd.A).toISOString())}`),
      ...gameFacts.map(f => h("div", { style: { display: "flex", gap: "8px", alignItems: "baseline", fontSize: "13px", color: "rgba(255,255,255,0.8)", padding: "3px 0" } },
        h("span", null, f.emoji),
        h("span", null, f.text)
      ))
    ) : null,
    // Main rows (or empty state)
    mainLb.length === 0
      ? h("div", { style: { textAlign: "center", padding: "30px 20px", color: "rgba(255,255,255,0.3)", fontSize: "13px" } }, "Sem classificação — só observadores.")
      : played.length === 0
        ? h("div", { style: { textAlign: "center", padding: "40px 20px", color: "rgba(255,255,255,0.3)", fontSize: "13px" } }, "A classificação será atualizada assim que os jogos comecem.")
        : h("div", null, ...mainLb.map((p, i) => renderLbRow(p, i, false))),
    // Observadores section (hidden entirely when no observers)
    obsLb.length > 0 ? h("div", null,
      h("div", { className: "lb-section-header" }, "Observadores"),
      played.length === 0
        ? h("div", { style: { textAlign: "center", padding: "20px", color: "rgba(255,255,255,0.3)", fontSize: "13px" } }, "A classificação será atualizada assim que os jogos comecem.")
        : h("div", null, ...obsLb.map((p, i) => renderLbRow(p, i, true)))
    ) : null
  );
}

function generateTemplate() {
  const sorted = [...state.matches].sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));
  const rows = [["Grupo", "Data", "Equipa A", "Marcador A", "Marcador B", "Equipa B", "id"]];
  sorted.forEach(m => {
    const pred = state.editPreds[m.id];
    const sa = pred?.score_a ?? "";
    const sb = pred?.score_b ?? "";
    rows.push([m.group_letter, fmtDate(m.kickoff), m.team_a, sa, sb, m.team_b, m.id]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{ wch: 6 }, { wch: 16 }, { wch: 18 }, { wch: 11 }, { wch: 11 }, { wch: 18 }, { hidden: true }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Prognósticos");
  XLSX.writeFile(wb, `prognosticos_${(state.currentPlayer?.name || "template").replace(/\s+/g, "_")}.xlsx`);
}

function generateReceipt() {
  const sorted = [...state.matches].sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));
  const submittedLabel = state.submittedAt && state.submittedAt.getTime() > 0
    ? fmtDate(state.submittedAt.toISOString()) + " " + fmtTime(state.submittedAt.toISOString())
    : "Data desconhecida";

  const meta = [[`Recibo de Prognósticos — ${state.currentPlayer?.name || ""} — Submetido em ${submittedLabel}`]];
  const header = [["Grupo", "Data", "Equipa A", "Marcador A", "Marcador B", "Equipa B", "id"]];
  const dataRows = sorted.map(m => {
    const pred = state.editPreds[m.id];
    return [m.group_letter, fmtDate(m.kickoff), m.team_a, pred?.score_a ?? "", pred?.score_b ?? "", m.team_b, m.id];
  });
  const ws1 = XLSX.utils.aoa_to_sheet([...meta, ...header, ...dataRows]);
  ws1["!cols"] = [{ wch: 6 }, { wch: 16 }, { wch: 18 }, { wch: 11 }, { wch: 11 }, { wch: 18 }, { hidden: true }];

  const [fp, sp, tp] = derivePodiumFromBracket(state.editBracket);
  const podiumRows = state.hasBracket && (fp || sp || tp)
    ? [["Posição", "Equipa"], ["Campeão", fp || "—"], ["2º Lugar", sp || "—"], ["3º Lugar", tp || "—"]]
    : [["⚠ Fase Final não submetida — acede ao separador Fase Final para completar o pódio."]];
  const ws2 = XLSX.utils.aoa_to_sheet(podiumRows);
  ws2["!cols"] = [{ wch: 12 }, { wch: 20 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, "Prognósticos");
  XLSX.utils.book_append_sheet(wb, ws2, "Pódio");

  const dateStr = (state.submittedAt || new Date()).toISOString().slice(0, 10);
  XLSX.writeFile(wb, `recibo_${(state.currentPlayer?.name || "jogador").replace(/\s+/g, "_")}_${dateStr}.xlsx`);
}

function generateAudit() {
  const tournamentState = computeActualTournamentState();
  const orderedPlayers = playersThenObservers(state.players);
  const groupMatches = [...state.matches]
    .filter(m => m.group_letter && m.group_letter.length === 1)
    .sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));

  const baseHeader = ["Grupo", "Data", "Equipa A", "Resultado A", "Resultado B", "Equipa B"];
  const predHeader = orderedPlayers.flatMap(p => [`${slugLabel(p)} A`, `${slugLabel(p)} B`]);
  const ptsHeader = orderedPlayers.map(p => `${slugLabel(p)} Pontos`);
  const header = [...baseHeader, ...predHeader, ...ptsHeader];

  const matchRows = groupMatches.map(m => {
    const result = [m.group_letter, fmtDate(m.kickoff), m.team_a,
                    m.score_a ?? "", m.score_b ?? "", m.team_b];
    const preds = orderedPlayers.flatMap(p => {
      const pred = state.allPreds[p.id]?.[m.id];
      return [pred?.score_a ?? "", pred?.score_b ?? ""];
    });
    const pts = orderedPlayers.map(p => {
      const pred = state.allPreds[p.id]?.[m.id];
      return m.score_a !== null && pred ? calcPts(pred, m) : "";
    });
    return [...result, ...preds, ...pts];
  });

  // Podium section
  const podiumBase = ["Posição", "Equipa Real"];
  const podiumPredHeader = orderedPlayers.map(p => slugLabel(p));
  const podiumPtsHeader = orderedPlayers.map(p => `${slugLabel(p)} Pontos`);
  const podiumHeader = [...podiumBase, ...podiumPredHeader, ...podiumPtsHeader];

  const slotLabels = ["Campeão", "2º Lugar", "3º Lugar"];
  const actualPodium = [tournamentState.champion, tournamentState.runnerUp, tournamentState.third];
  const podiumRows = slotLabels.map((label, slotIdx) => {
    const actual = actualPodium[slotIdx] || "";
    const picks = orderedPlayers.map(p => {
      const pod = state.allPodiums[p.id];
      const podArr = pod ? [pod.first_place, pod.second_place, pod.third_place] : ["", "", ""];
      return podArr[slotIdx] || "";
    });
    const slotPts = orderedPlayers.map(p => {
      const pod = state.allPodiums[p.id];
      const podArr = pod ? [pod.first_place, pod.second_place, pod.third_place] : ["", "", ""];
      const pts = calcPodiumSlotPts(slotIdx, podArr[slotIdx], tournamentState);
      return pts ?? "";
    });
    return [label, actual, ...picks, ...slotPts];
  });

  const aoa = [
    header, ...matchRows,
    [], [],
    podiumHeader, ...podiumRows
  ];

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Resultados");
  const dateStr = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `goalgut_resultados_${dateStr}.xlsx`);
}

function importExcel(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      const newPreds = { ...state.editPreds };
      let count = 0;
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const id = row[6];
        const scoreA = parseInt(row[3]);
        const scoreB = parseInt(row[4]);
        if (!id) continue;
        if (isNaN(scoreA) || isNaN(scoreB) || scoreA < 0 || scoreB < 0 || scoreA > 20 || scoreB > 20) continue;
        newPreds[id] = { score_a: scoreA, score_b: scoreB };
        count++;
      }
      if (count === 0) { state.importMsg = "⚠ Nenhum resultado válido encontrado"; }
      else { state.editPreds = newPreds; state.predictionsEdited = true; state.importMsg = `✓ ${count} prognósticos importados`; }
    } catch (_) {
      state.importMsg = "⚠ Erro ao ler o ficheiro";
    }
    render();
    setTimeout(() => { state.importMsg = null; render(); }, 3000);
  };
  reader.readAsArrayBuffer(file);
}

function renderPredictions() {
  const cp = state.currentPlayer;
  const GROUP_ORDER = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const groupMatches = {};
  GROUP_ORDER.forEach(g => { groupMatches[g] = []; });
  [...state.matches]
    .filter(m => m.group_letter && m.group_letter.length === 1)
    .sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff))
    .forEach(m => { if (groupMatches[m.group_letter]) groupMatches[m.group_letter].push(m); });
  const rawStandings = computePredictedStandings(state.editPreds, state.matches);
  const standings = applyTiebreaks(rawStandings, state.tiebreaks);
  const medals = ["🥇","🥈","🥉"];
  const labels = ["Campeão","2º Lugar","3º Lugar"];
  const [podiumChamp, podiumSecond, podiumThird] = derivePodiumFromBracket(state.editBracket);
  const podiumTeams = [podiumChamp, podiumSecond, podiumThird];
  const hasPodium = podiumTeams.some(t => t);

  return h("div", { className: "content" },
    h("h2", { style: { marginBottom: "4px" } }, "Os Meus Prognósticos"),
    h("p", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "12px" } },
      "A jogar como ", h("span", { style: { color: "#34d399", fontWeight: 700 } }, cp?.name || "")
    ),
    // Excel import/export
    h("div", { style: { display: "flex", gap: "8px", marginBottom: state.importMsg ? "8px" : "16px" } },
      h("button", { onClick: generateTemplate, style: { flex: 1, padding: "9px", borderRadius: "10px", border: "1px solid rgba(52,211,153,0.2)", background: "rgba(52,211,153,0.06)", color: "#34d399", fontSize: "12px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" } }, "⬇ Template Excel"),
      state.submitted ? h("button", { onClick: generateReceipt, style: { flex: 1, padding: "9px", borderRadius: "10px", border: "1px solid rgba(52,211,153,0.2)", background: "rgba(52,211,153,0.06)", color: "#34d399", fontSize: "12px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" } }, "⬇ Recibo") : null,
      h("label", { style: { flex: 1, padding: "9px", borderRadius: "10px", border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.04)", color: "rgba(255,255,255,0.65)", fontSize: "12px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", textAlign: "center", display: "block" } },

      )
    ),
    state.importMsg ? h("div", { style: { background: state.importMsg.startsWith("✓") ? "rgba(52,211,153,0.1)" : "rgba(239,68,68,0.08)", border: `1px solid ${state.importMsg.startsWith("✓") ? "rgba(52,211,153,0.2)" : "rgba(239,68,68,0.2)"}`, borderRadius: "10px", padding: "9px 14px", marginBottom: "12px", fontSize: "13px", color: state.importMsg.startsWith("✓") ? "#34d399" : "#f87171", textAlign: "center", fontWeight: 600 } }, state.importMsg) : null,
    // Podium — read-only, derived from bracket (locked until predictions submitted)
    h("div", { className: "podium-bar" },
      h("div", { className: "podium-card" },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" } },
          h("div", { style: { fontSize: "12px", fontWeight: 700, color: "rgba(251,191,36,0.8)", textTransform: "uppercase", letterSpacing: "0.5px" } }, "Pódio Final"),
          state.submitted
            ? h("button", { onClick: () => setState({ view: "bracket" }), style: { background: "none", border: "1px solid rgba(251,191,36,0.25)", borderRadius: "8px", color: "rgba(251,191,36,0.7)", fontSize: "11px", fontWeight: 600, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" } }, state.hasBracket ? "Editar →" : "Criar →")
