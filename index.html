<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prognósticos WC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #fff; font-family: 'DM Sans', -apple-system, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* Nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; padding: 6px 0 env(safe-area-inset-bottom, 8px); }
  .nav button { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; padding: 4px 16px; transition: color 0.2s; font-family: inherit; }
  .nav button.active { color: #34d399; }

  /* Header */
  .header { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 90; border-bottom: 1px solid rgba(52,211,153,0.15); display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-circle { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #34d399, #06b6d4); display: flex; align-items: center; justify-content: center; }
  .player-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 6px 14px; color: #34d399; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; position: relative; }
  .player-dropdown { position: absolute; right: 0; top: 110%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden; min-width: 180px; z-index: 999; animation: fadeIn 0.15s ease; }
  .player-dropdown button { display: block; width: 100%; padding: 10px 16px; border: none; background: transparent; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; font-family: inherit; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .player-dropdown button.sel { background: rgba(52,211,153,0.15); color: #34d399; }

  /* Badge */
  .badge { font-weight: 700; font-variant-numeric: tabular-nums; display: inline-block; min-width: 24px; text-align: center; color: #fff; }
  .badge-sm { font-size: 11px; padding: 1px 6px; border-radius: 6px; }
  .badge-md { font-size: 13px; padding: 2px 8px; border-radius: 8px; }

  /* Content */
  .content { padding: 16px; }
  h2 { font-size: 18px; font-weight: 800; margin-bottom: 14px; }
  .group-label { font-size: 12px; font-weight: 700; color: #34d399; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 4px; }

  /* Match card */
  .match-card { display: flex; align-items: center; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); font-family: inherit; width: 100%; text-align: left; cursor: pointer; margin-bottom: 4px; }
  .match-card.upcoming { opacity: 0.5; cursor: default; }
  .match-card.exact { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }

  /* Filter buttons */
  .filters { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .filter-btn.active { border-color: #34d399; background: rgba(52,211,153,0.15); color: #34d399; }
  .group-filters { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .group-btn { padding: 4px 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .group-btn.active { background: #34d399; color: #0f172a; }

  /* Score display */
  .score-box { font-size: 14px; font-weight: 900; color: #fff; background: rgba(52,211,153,0.12); padding: 2px 8px; border-radius: 6px; font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }

  /* Prediction input */
  .pred-input { width: 38px; height: 32px; text-align: center; font-size: 15px; font-weight: 800; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(52,211,153,0.3); border-radius: 8px; font-family: inherit; outline: none; }
  .pred-input:disabled { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.06); cursor: not-allowed; }

  /* Submit button */
  .submit-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, #34d399, #06b6d4); color: #0f172a; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; box-shadow: 0 8px 24px rgba(52,211,153,0.3); }

  /* Podium */
  .podium-bar { position: sticky; top: 68px; z-index: 50; background: linear-gradient(180deg, #0f172a 0%, #0f172a 92%, transparent 100%); padding-bottom: 12px; margin-bottom: 4px; }
  .podium-card { background: linear-gradient(135deg, rgba(251,191,36,0.06), rgba(180,83,9,0.04)); border: 1px solid rgba(251,191,36,0.12); border-radius: 14px; padding: 14px; }
  .podium-select { width: 100%; padding: 7px 4px; border-radius: 8px; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-weight: 600; font-family: inherit; outline: none; appearance: none; text-align: center; cursor: pointer; }

  /* Progress bar */
  .progress-card { background: linear-gradient(135deg, rgba(52,211,153,0.1), rgba(6,182,212,0.05)); border: 1px solid rgba(52,211,153,0.15); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
  .progress-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #34d399, #06b6d4); border-radius: 3px; transition: width 0.5s ease; }

  /* Leaderboard row */
  .lb-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-family: inherit; text-align: left; background: rgba(255,255,255,0.02); margin-bottom: 6px; }
  .lb-row.top { background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.12); }
  .lb-row.expanded-top { border-radius: 12px 12px 0 0; border-bottom: none; }
  .lb-expand { padding: 10px 14px 12px; border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.05); border-top: none; animation: fadeIn 0.15s ease; }
  .lb-expand.top { background: rgba(52,211,153,0.03); border-color: rgba(52,211,153,0.12); }

  /* PIN modal */
  .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .pin-modal { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 24px; width: 300px; text-align: center; animation: fadeIn 0.2s ease; }
  .pin-input { width: 140px; height: 48px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: 8px; background: rgba(255,255,255,0.06); color: #fff; border: 2px solid rgba(52,211,153,0.3); border-radius: 12px; font-family: inherit; outline: none; margin: 16px 0; }
  .pin-input:focus { border-color: #34d399; }
  .pin-input.error { border-color: #ef4444; animation: shake 0.3s ease; }
  .pin-btn { padding: 10px 24px; border-radius: 10px; border: none; background: #34d399; color: #0f172a; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; }
  .pin-cancel { padding: 8px 24px; border-radius: 10px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 8px; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* Deadline banner */
  .deadline-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; text-align: center; }

  /* Chart */
  .chart-wrap { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; margin-bottom: 20px; }

  /* Bracket */
  .bracket-match { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; margin-bottom: 4px; }
  .bracket-match--picked { border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.04); }
  .bracket-select { flex: 1; padding: 7px 10px; border-radius: 8px; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 12px; font-weight: 600; font-family: inherit; outline: none; cursor: pointer; }
  .bracket-select:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Standings modal */
  .standings-modal { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; width: calc(100% - 32px); max-width: 440px; max-height: 82vh; overflow-y: auto; animation: fadeIn 0.2s ease; }

  /* Loading */
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(52,211,153,0.2); border-top-color: #34d399; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL = "https://thjvoocszfzqkyatkevv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoanZvb2NzemZ6cWt5YXRrZXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjUxNjgsImV4cCI6MjA5MTMwMTE2OH0.ZcddMnsMF9cejXx3zuWNVqd4F8bMxgdIRHLSJsC7aUs";

async function sbGet(table, params = "") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error(`GET ${table}: ${r.status}`);
  return r.json();
}
async function sbPost(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(data)
  });
  if (!r.ok) { const e = await r.text(); throw new Error(`POST ${table}: ${r.status} ${e}`); }
}

// ─── SCORING ─────────────────────────────────────────────────────────
function calcPts(pred, m) {
  if (!pred || m.score_a === null || m.score_b === null) return null;
  const pO = pred.score_a > pred.score_b ? "A" : pred.score_a < pred.score_b ? "B" : "D";
  const rO = m.score_a > m.score_b ? "A" : m.score_a < m.score_b ? "B" : "D";
  let p = 0;
  if (pO !== rO) p += (pO === "D" || rO === "D") ? 2 : 3;
  p += Math.abs(m.score_a - pred.score_a) + Math.abs(m.score_b - pred.score_b);
  return p;
}
function isExact(pred, m) {
  return pred && m.score_a !== null && pred.score_a === m.score_a && pred.score_b === m.score_b;
}
function badgeColor(pts) {
  if (pts === 0) return "#10b981";
  if (pts <= 2) return "#34d399";
  if (pts <= 4) return "#fbbf24";
  if (pts <= 6) return "#fb923c";
  return "#ef4444";
}

function matchWinner(m) {
  if (m.score_a === null) return null;
  if (m.score_a > m.score_b) return m.team_a;
  if (m.score_b > m.score_a) return m.team_b;
  if (m.status === 'pen-home') return m.team_a;
  if (m.status === 'pen-away') return m.team_b;
  return null;
}

function calcPodiumPts(podiumArr, tournamentState) {
  if (!tournamentState?.groupStageComplete) return null;
  const { champion, runnerUp, third, eliminated } = tournamentState;
  const actual = [champion, runnerUp, third];
  let pts = 0, hasAnyScore = false;
  for (let i = 0; i < 3; i++) {
    const predicted = podiumArr[i];
    if (!predicted) { pts += 10; hasAnyScore = true; continue; }
    if (eliminated.has(predicted)) {
      pts += 10; hasAnyScore = true;
    } else if (actual[i] !== null) {
      if (predicted === actual[i]) { hasAnyScore = true; }
      else if (actual.filter(Boolean).includes(predicted)) { pts += 5; hasAnyScore = true; }
      else { pts += 10; hasAnyScore = true; }
    }
    // team still in tournament, position unknown — don't score yet
  }
  return hasAnyScore ? pts : null;
}

// ─── FORMATTING ──────────────────────────────────────────────────────
function fmtShort(iso) { const d = new Date(iso); return `${d.getDate().toString().padStart(2,"0")}/${(d.getMonth()+1).toString().padStart(2,"0")}`; }
function fmtTime(iso) { const d = new Date(iso); return `${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`; }
function fmtDate(iso) { const wd = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"]; const d = new Date(iso); return `${wd[d.getDay()]} ${fmtShort(iso)} ${fmtTime(iso)}`; }

// ─── CHART ───────────────────────────────────────────────────────────
let chartInstance = null;

const PLAYER_COLORS = ["#34d399","#06b6d4","#f59e0b","#f472b6","#a78bfa","#fb923c","#60a5fa","#e2e8f0"];

function initChart() {
  const canvas = document.getElementById("points-chart");
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const played = state.matches
    .filter(m => m.score_a !== null)
    .sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));

  const dates = [...new Set(played.map(m => m.kickoff.split("T")[0]))].sort();

  const datasets = state.players.map((p, i) => {
    let cumulative = 0;
    const data = dates.map(date => {
      played.filter(m => m.kickoff.startsWith(date)).forEach(m => {
        const pts = calcPts(state.allPreds[p.id]?.[m.id], m);
        if (pts !== null) cumulative += pts;
      });
      return cumulative;
    });
    return {
      label: p.short_name || p.name.split(" ")[0],
      data,
      borderColor: PLAYER_COLORS[i % PLAYER_COLORS.length],
      backgroundColor: "transparent",
      borderWidth: 2,
      pointRadius: 3,
      tension: 0.3
    };
  });

  chartInstance = new Chart(canvas, {
    type: "line",
    data: {
      labels: dates.map(d => { const [,m,day] = d.split("-"); return `${day}/${m}`; }),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: "rgba(255,255,255,0.6)", font: { size: 11, family: "'DM Sans', sans-serif" }, boxWidth: 12, padding: 10 }
        },
        tooltip: { mode: "index", intersect: false }
      },
      scales: {
        x: {
          ticks: { color: "rgba(255,255,255,0.4)", font: { size: 10 } },
          grid: { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          ticks: { color: "rgba(255,255,255,0.4)", font: { size: 10 } },
          grid: { color: "rgba(255,255,255,0.04)" },
          title: { display: true, text: "Pontos", color: "rgba(255,255,255,0.3)", font: { size: 10 } }
        }
      }
    }
  });
}

// ─── STATE ───────────────────────────────────────────────────────────
let state = {
  view: "matches", players: [], matches: [], allPreds: {}, allPodiums: {},
  currentPlayer: null, selectedMatch: null, groupFilter: "all", statusFilter: "all",
  editPreds: {}, editPodium: ["","",""], submitted: false, submitting: false,
  expanded: {}, dropdownOpen: false, loading: true, error: null,
  deadline: null, deadlinePassed: false, actualPodium: null,
  showPinModal: false, pinValue: "", pinError: false, pinCallback: null,
  editBracket: {}, allBrackets: {}, bracketSubmitting: false, tiebreaks: {}, showStandingsModal: false,
  hasBracket: false, bracketStale: false, predictionsEdited: false
};

function setState(partial) { Object.assign(state, partial); render(); }

// ─── PIN VERIFICATION ────────────────────────────────────────────────
function requestPin(callback) {
  setState({ showPinModal: true, pinValue: "", pinError: false, pinCallback: callback });
}

function verifyPin() {
  if (!state.pinValue) return;
  const pin = state.pinValue;
  const cb = state.pinCallback;
  setState({ showPinModal: false, pinValue: "", pinError: false, pinCallback: null });
  if (cb) cb(pin);
}

function cancelPin() {
  setState({ showPinModal: false, pinValue: "", pinError: false, pinCallback: null });
}

// ─── DATA LOADING ────────────────────────────────────────────────────
async function loadData() {
  setState({ loading: true, error: null });
  try {
    const [players, matches, preds, podiums, brackets, config] = await Promise.all([
      sbGet("players", "select=id,name,short_name&order=name"),
      sbGet("matches", "order=kickoff"),
      sbGet("predictions", "select=*"),
      sbGet("podium_predictions", "select=*"),
      sbGet("bracket_predictions", "select=*"),
      sbGet("tournament_config", "key=in.(submission_deadline,actual_podium)")
    ]);
    const predMap = {};
    preds.forEach(p => { if (!predMap[p.player_id]) predMap[p.player_id] = {}; predMap[p.player_id][p.match_id] = p; });
    const podMap = {};
    podiums.forEach(p => { podMap[p.player_id] = p; });
    const bracketMap = {};
    brackets.forEach(b => { if (!bracketMap[b.player_id]) bracketMap[b.player_id] = {}; bracketMap[b.player_id][`${b.round}-${b.slot}`] = b.picked_team; });
    const cp = state.currentPlayer || players[0] || null;
    const myPreds = predMap[cp?.id] || {};
    const myPodium = podMap[cp?.id];
    const editPreds = {};
    matches.forEach(m => { editPreds[m.id] = myPreds[m.id] ? { score_a: myPreds[m.id].score_a, score_b: myPreds[m.id].score_b } : { score_a: 0, score_b: 0 }; });
    
    // Parse deadline
    let deadline = null;
    let deadlinePassed = false;
    const deadlineCfg = config.find(c => c.key === 'submission_deadline');
    if (deadlineCfg) {
      deadline = new Date(deadlineCfg.value);
      deadlinePassed = new Date() > deadline;
    }
    // Parse actual podium (set by admin after tournament ends)
    let actualPodium = null;
    const podiumCfg = config.find(c => c.key === 'actual_podium');
    if (podiumCfg) { try { actualPodium = JSON.parse(podiumCfg.value); } catch (e) {} }

    setState({
      players, matches, allPreds: predMap, allPodiums: podMap, allBrackets: bracketMap, currentPlayer: cp,
      editPreds, editPodium: myPodium ? [myPodium.first_place, myPodium.second_place, myPodium.third_place] : ["","",""],
      editBracket: bracketMap[cp?.id] || {},
      tiebreaks: {},
      submitted: Object.keys(myPreds).length > 0, loading: false,
      deadline, deadlinePassed, actualPodium,
      hasBracket: !!podMap[cp?.id], bracketStale: false, predictionsEdited: false
    });
  } catch (e) { setState({ error: e.message, loading: false }); }
}

function switchPlayer(p) {
  const myPreds = state.allPreds[p.id] || {};
  const myPodium = state.allPodiums[p.id];
  const editPreds = {};
  state.matches.forEach(m => { editPreds[m.id] = myPreds[m.id] ? { score_a: myPreds[m.id].score_a, score_b: myPreds[m.id].score_b } : { score_a: 0, score_b: 0 }; });
  setState({
    currentPlayer: p, dropdownOpen: false, editPreds,
    editPodium: myPodium ? [myPodium.first_place, myPodium.second_place, myPodium.third_place] : ["","",""],
    editBracket: state.allBrackets[p.id] || {},
    tiebreaks: {},
    submitted: Object.keys(myPreds).length > 0,
    hasBracket: !!state.allPodiums[p.id], bracketStale: false, predictionsEdited: false
  });
}

async function submitPredictions() {
  if (state.submitting) return;
  if (state.deadlinePassed) { alert("O prazo para submissão já passou!"); return; }
  if (state.hasBracket && state.predictionsEdited) {
    if (!confirm("Editaste os prognósticos após submeter a Fase Final. Ao resubmeter, o quadro ficará desatualizado — terás de refazer a Fase Final. Continuar?")) return;
  }
  requestPin(async (pin) => {
    setState({ submitting: true });
    const hadBracket = state.hasBracket;
    try {
      const predictions = Object.entries(state.editPreds).map(([mid, p]) => ({
        player_id: state.currentPlayer.id, match_id: parseInt(mid), score_a: p.score_a, score_b: p.score_b
      }));
      const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-predictions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ player_id: state.currentPlayer.id, pin, predictions, podium: null })
      });
      const data = await res.json();
      if (!res.ok) {
        alert(res.status === 401 ? "Código incorrecto. Por favor tenta novamente." : "Erro: " + (data.error || res.status));
        setState({ submitting: false });
        return;
      }
      await loadData();
      if (hadBracket) { state.bracketStale = true; render(); }
    } catch (e) { alert("Erro: " + e.message); setState({ submitting: false }); }
  });
}

// ─── BRACKET ─────────────────────────────────────────────────────────
// FIFA WC2026 knockout bracket — fixed structure, no redraw
// R32 matchups sourced from official FIFA competition regulations
const R32 = [
  { slot:0,  a:{type:'runnerup',group:'A'}, b:{type:'runnerup',group:'B'} },
  { slot:1,  a:{type:'winner', group:'E'}, b:{type:'third',groups:['A','B','C','D','F']} },
  { slot:2,  a:{type:'winner', group:'F'}, b:{type:'runnerup',group:'C'} },
  { slot:3,  a:{type:'winner', group:'C'}, b:{type:'runnerup',group:'F'} },
  { slot:4,  a:{type:'winner', group:'I'}, b:{type:'third',groups:['C','D','F','G','H']} },
  { slot:5,  a:{type:'runnerup',group:'E'}, b:{type:'runnerup',group:'I'} },
  { slot:6,  a:{type:'winner', group:'A'}, b:{type:'third',groups:['C','E','F','H','I']} },
  { slot:7,  a:{type:'winner', group:'L'}, b:{type:'third',groups:['E','H','I','J','K']} },
  { slot:8,  a:{type:'winner', group:'D'}, b:{type:'third',groups:['B','E','F','I','J']} },
  { slot:9,  a:{type:'winner', group:'G'}, b:{type:'third',groups:['A','E','H','I','J']} },
  { slot:10, a:{type:'runnerup',group:'K'}, b:{type:'runnerup',group:'L'} },
  { slot:11, a:{type:'winner', group:'H'}, b:{type:'runnerup',group:'J'} },
  { slot:12, a:{type:'winner', group:'B'}, b:{type:'third',groups:['E','F','G','I','J']} },
  { slot:13, a:{type:'winner', group:'J'}, b:{type:'runnerup',group:'H'} },
  { slot:14, a:{type:'winner', group:'K'}, b:{type:'third',groups:['D','E','I','J','L']} },
  { slot:15, a:{type:'runnerup',group:'D'}, b:{type:'runnerup',group:'G'} },
];
const R16 = [
  { slot:0, a:{from:'r32',slot:1},  b:{from:'r32',slot:4}  },
  { slot:1, a:{from:'r32',slot:0},  b:{from:'r32',slot:2}  },
  { slot:2, a:{from:'r32',slot:3},  b:{from:'r32',slot:5}  },
  { slot:3, a:{from:'r32',slot:6},  b:{from:'r32',slot:7}  },
  { slot:4, a:{from:'r32',slot:10}, b:{from:'r32',slot:11} },

  { slot:7, a:{from:'r32',slot:12}, b:{from:'r32',slot:14} },
];
const QF = [
  { slot:0, a:{from:'r16',slot:0}, b:{from:'r16',slot:1} },
  { slot:1, a:{from:'r16',slot:4}, b:{from:'r16',slot:5} },
  { slot:2, a:{from:'r16',slot:2}, b:{from:'r16',slot:3} },
  { slot:3, a:{from:'r16',slot:6}, b:{from:'r16',slot:7} },

const SF = [
  { slot:0, a:{from:'qf',slot:0}, b:{from:'qf',slot:1} },

const BRACKET_STRUCTURE = [
  { id:'r32',   label:'Ronda de 32',      matches: R32   },
  { id:'r16',   label:'Oitavos de Final', matches: R16   },

  { id:'final', label:'Final',            matches: [{ slot:0, a:{from:'sf',slot:0}, b:{from:'sf',slot:1} }] },
];

// Compute group standings from played group matches
function computeGroupStandings() {
  const groups = {};
  state.matches.forEach(m => {
    if (!groups[m.group_letter]) groups[m.group_letter] = {};
    [m.team_a, m.team_b].forEach(t => {
      if (!groups[m.group_letter][t]) groups[m.group_letter][t] = { team:t, pts:0, gd:0, gf:0, played:0 };
    });
    if (m.score_a !== null) {
      const g = groups[m.group_letter];
      g[m.team_a].played++; g[m.team_b].played++;
      g[m.team_a].gf += m.score_a; g[m.team_a].gd += (m.score_a - m.score_b);
      g[m.team_b].gf += m.score_b; g[m.team_b].gd += (m.score_b - m.score_a);
      if (m.score_a > m.score_b) g[m.team_a].pts += 3;
      else if (m.score_b > m.score_a) g[m.team_b].pts += 3;
      else { g[m.team_a].pts++; g[m.team_b].pts++; }
    }
  });
  const result = {};
  Object.entries(groups).forEach(([grp, teams]) => {
    result[grp] = Object.values(teams).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  });
  return result;
}

// Derives actual tournament state from real match results.
// Knockout matches are seeded via seed-knockout.js after group stage ends.
function computeActualTournamentState() {
  const eliminated = new Set();
  let champion = null, runnerUp = null, third = null;

  const groupMatches = state.matches.filter(m => m.group_letter && m.group_letter.length === 1);
  const groupStageComplete = groupMatches.length >= 72 && groupMatches.every(m => m.score_a !== null);
  if (!groupStageComplete) return { champion, runnerUp, third, eliminated, groupStageComplete: false };

  // Group-stage: teams finishing 3rd/4th that don't qualify as best 3rd are eliminated
  const standings = computeGroupStandings();
  const all3rds = Object.entries(standings)
    .map(([grp, s]) => s[2] ? { team: s[2].team, group: grp, pts: s[2].pts, gd: s[2].gd, gf: s[2].gf } : null)
    .filter(Boolean)
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  const qualifiedThirds = new Set(all3rds.slice(0, 8).map(t => t.team));
  Object.values(standings).forEach(sorted => {
    sorted.forEach((t, i) => { if (i >= 2 && !qualifiedThirds.has(t.team)) eliminated.add(t.team); });
  });

  // R32 → QF: losers are eliminated immediately
  ['R32', 'R16', 'QF'].forEach(stage => {
    state.matches.filter(m => m.group_letter === stage).forEach(m => {
      const w = matchWinner(m);
      if (w) eliminated.add(w === m.team_a ? m.team_b : m.team_a);
    });
  });

  // SF losers go to 3rd place match — not eliminated yet
  state.matches.filter(m => m.group_letter === 'SF').forEach(m => {
    const w = matchWinner(m);
    if (w) eliminated.delete(w === m.team_a ? m.team_b : m.team_a);
  });

  // 3rd place match
  const thirdMatch = state.matches.find(m => m.group_letter === '3P');
  if (thirdMatch) {
    const w = matchWinner(thirdMatch);
    if (w) { third = w; eliminated.add(w === thirdMatch.team_a ? thirdMatch.team_b : thirdMatch.team_a); }
  }

  // Final
  const finalMatch = state.matches.find(m => m.group_letter === 'F');
  if (finalMatch) {
    const w = matchWinner(finalMatch);
    if (w) { champion = w; runnerUp = w === finalMatch.team_a ? finalMatch.team_b : finalMatch.team_a; }
  }

  // Fallback: manual actual_podium from tournament_config (covers PEN edge cases)
  if (!champion && state.actualPodium?.first_place) {
    champion = state.actualPodium.first_place;
    runnerUp = state.actualPodium.second_place;
    third = third || state.actualPodium.third_place;
  }

  return { champion, runnerUp, third, eliminated, groupStageComplete: true };
}

// ─── PREDICTED STANDINGS ─────────────────────────────────────────────
function computePredictedStandings(editPreds, matches) {
  const groups = {};
  matches.forEach(m => {
    if (!groups[m.group_letter]) groups[m.group_letter] = {};
    [m.team_a, m.team_b].forEach(t => {
      if (!groups[m.group_letter][t]) groups[m.group_letter][t] = { team: t, pts: 0, gd: 0, gf: 0, played: 0 };
    });
    const pred = editPreds[m.id];
    const sa = pred ? (pred.score_a ?? 0) : 0;
    const sb = pred ? (pred.score_b ?? 0) : 0;
    const g = groups[m.group_letter];
    g[m.team_a].played++; g[m.team_b].played++;
    g[m.team_a].gf += sa; g[m.team_a].gd += (sa - sb);
    g[m.team_b].gf += sb; g[m.team_b].gd += (sb - sa);
    if (sa > sb) g[m.team_a].pts += 3;
    else if (sb > sa) g[m.team_b].pts += 3;
    else { g[m.team_a].pts++; g[m.team_b].pts++; }
  });
  const result = {};
  Object.entries(groups).forEach(([grp, teams]) => {
    result[grp] = Object.values(teams).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  });
  return result;
}

function applyTiebreaks(standings, tiebreaks) {
  const result = {};
  Object.entries(standings).forEach(([grp, sorted]) => {
    const teams = [...sorted];
    for (let i = 0; i < teams.length - 1; i++) {
      const a = teams[i], b = teams[i + 1];
      if (a.pts === b.pts && a.gd === b.gd && a.gf === b.gf) {
        const key = `${grp}-${i + 1}`;
        if (tiebreaks[key] === b.team) { teams[i] = b; teams[i + 1] = a; }
      }
    }
    result[grp] = teams;
  });
  return result;
}

function detectPendingTies(standings, tiebreaks) {
  const ties = [];
  Object.entries(standings).forEach(([grp, sorted]) => {
    for (let i = 0; i < sorted.length - 1; i++) {
      const a = sorted[i], b = sorted[i + 1];
      if (a.pts === b.pts && a.gd === b.gd && a.gf === b.gf) {
        const key = `${grp}-${i + 1}`;
        const resolved = tiebreaks[key];
        if (!resolved || (resolved !== a.team && resolved !== b.team)) {
          ties.push({ group: grp, pos: i + 1, key, teams: [a.team, b.team] });
        }
      }
    }
  });
  return ties;
}

function computeBest3rds(standings) {
  return Object.entries(standings)
    .map(([grp, sorted]) => sorted[2] ? { team: sorted[2].team, group: grp, pts: sorted[2].pts, gd: sorted[2].gd, gf: sorted[2].gf } : null)
    .filter(Boolean)
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf)
    .slice(0, 8);
}

const THIRD_SLOT_GROUPS = {
  1:  ['A','B','C','D','F'],
  4:  ['C','D','F','G','H'],
  6:  ['C','E','F','H','I'],
  7:  ['E','H','I','J','K'],
  8:  ['B','E','F','I','J'],
  9:  ['A','E','H','I','J'],
  12: ['E','F','G','I','J'],
  14: ['D','E','I','J','L']
};

function assignBest3rdsToSlots(best3rds) {
  const result = {};
  const used = new Set();
  for (const [slot, groups] of Object.entries(THIRD_SLOT_GROUPS)) {
    const candidate = best3rds.find(t => groups.includes(t.group) && !used.has(t.team));
    if (candidate) { result[slot] = candidate.team; used.add(candidate.team); }
  }
  return result;
}

function derivePodiumFromBracket(editBracket) {
  const champion = editBracket['final-0'] || "";
  const sf0 = editBracket['sf-0'] || "";
  const sf1 = editBracket['sf-1'] || "";
  const runnerUp = champion && sf0 && sf1 ? (champion === sf0 ? sf1 : sf0) : "";
  const third = editBracket['third-0'] || "";
  return [champion, runnerUp, third];
}

// Resolve the actual team (or null) and a display label for a bracket slot descriptor
function resolveTeam(desc, editBracket, standings, best3rds, r32Slot) {
  if (desc.type) {
    const lbl = desc.type === 'winner'   ? `1º Gr.${desc.group}`
              : desc.type === 'runnerup' ? `2º Gr.${desc.group}`
              : `Melhor 3º`;
    if (desc.type === 'third') {
      return { team: best3rds?.[r32Slot] ?? null, label: lbl };
    }
    const grp = standings[desc.group];
    if (!grp) return { team: null, label: lbl };
    if (desc.type === 'winner')   return { team: grp[0]?.team ?? null, label: lbl };
    if (desc.type === 'runnerup') return { team: grp[1]?.team ?? null, label: lbl };
    return { team: null, label: lbl };
  }

  const rlabels = { r32:'R32', r16:'R16', qf:'QF', sf:'SF' };
  const srcKey = `${desc.from}-${desc.slot}`;
  const fallback = `${desc.loser ? 'Perd.' : 'Venc.'} ${rlabels[desc.from]} J${desc.slot+1}`;

  if (desc.loser) {
    const srcRound = BRACKET_STRUCTURE.find(r => r.id === desc.from);
    const srcMatch = srcRound?.matches.find(m => m.slot === desc.slot);
    if (!srcMatch) return { team: null, label: fallback };
    const { team: tA } = resolveTeam(srcMatch.a, editBracket, standings, best3rds, srcMatch.slot);
    const { team: tB } = resolveTeam(srcMatch.b, editBracket, standings, best3rds, srcMatch.slot);
    const winner = editBracket[srcKey];
    const loser = (winner && tA && tB) ? (winner === tA ? tB : tA) : null;
    return { team: loser, label: fallback };
  }

  const winner = editBracket[srcKey];
  return { team: winner || null, label: fallback };
}

async function submitBracket() {
  if (state.bracketSubmitting) return;
  if (state.deadlinePassed) { alert("O prazo para submissão já passou!"); return; }
  requestPin(async (pin) => {
    setState({ bracketSubmitting: true });
    try {
      // 1. Submit bracket picks
      const picks = Object.entries(state.editBracket).filter(([, t]) => t);
      const bracket = picks.map(([key, picked_team]) => {
        const parts = key.split("-"); const slot = parseInt(parts.pop()); const round = parts.join("-");
        return { round, slot, picked_team };
      });
      const res1 = await fetch(`${SUPABASE_URL}/functions/v1/submit-bracket`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ player_id: state.currentPlayer.id, pin, bracket })
      });
      const d1 = await res1.json();
      if (!res1.ok) {
        alert(res1.status === 401 ? "Código incorrecto. Por favor tenta novamente." : "Erro: " + (d1.error || res1.status));
        setState({ bracketSubmitting: false });
        return;
      }
      // 2. Save derived podium (re-submits existing predictions + new podium)
      const [fp, sp, tp] = derivePodiumFromBracket(state.editBracket);
      const podium = (fp && sp && tp) ? { first_place: fp, second_place: sp, third_place: tp } : null;
      if (podium) {
        const predictions = Object.entries(state.editPreds).map(([mid, p]) => ({
          player_id: state.currentPlayer.id, match_id: parseInt(mid), score_a: p.score_a, score_b: p.score_b
        }));
        const res2 = await fetch(`${SUPABASE_URL}/functions/v1/submit-predictions`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({ player_id: state.currentPlayer.id, pin, predictions, podium })
        });
        const d2 = await res2.json();
        if (!res2.ok) {
          alert("Erro ao guardar pódio: " + (d2.error || res2.status));
          setState({ bracketSubmitting: false });
          return;
        }
      }
      await loadData();
    } catch (e) { alert("Erro: " + e.message); setState({ bracketSubmitting: false }); }
  });
}

          const sel = document.createElement("select");
          sel.className = "bracket-select";
          sel.disabled = locked;
          const def = document.createElement("option"); def.value = ""; def.textContent = "— Vencedor —"; def.style.background = "#1e293b";

          options.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; o.style.background = "#1e293b"; sel.appendChild(o); });

          return h("div", { className: `bracket-match${picked ? " bracket-match--picked" : ""}` },

              h("span", { style: {

              }}, teamB || labelB)
            ),
            h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
              h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.3)", whiteSpace: "nowrap" } }, "Vencedor:"),
              sel
            )
          );
        })

    ),

    locked

        )

    ) : null,

// ─── RENDER ──────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else if (k === "disabled") { if (v) el.setAttribute("disabled",""); }
    else if (k === "value") el.value = v;
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return el;
}

function badge(pts, sm) {
  if (pts === null || pts === undefined) return document.createTextNode("");
  return h("span", { className: `badge ${sm ? "badge-sm" : "badge-md"}`, style: { background: badgeColor(pts) } }, String(pts));
}

  const lb = state.players.map(p => {
    let total = 0, scored = 0, exacts = 0;
    played.forEach(m => {
      const pred = state.allPreds[p.id]?.[m.id];
      const pts = calcPts(pred, m);
      if (pts !== null) { total += pts; scored++; if (isExact(pred, m)) exacts++; }
    });
    const pod = state.allPodiums[p.id];
    const podiumArr = pod ? [pod.first_place, pod.second_place, pod.third_place] : ["", "", ""];
    const podiumPts = calcPodiumPts(podiumArr, tournamentState);
    if (podiumPts !== null) total += podiumPts;
    return { ...p, total, scored, exacts, podiumArr, podiumPts };

                const actual = tournamentState.groupStageComplete ? [tournamentState.champion, tournamentState.runnerUp, tournamentState.third] : null;
                const pPts = actual && predicted ? (tournamentState.eliminated.has(predicted) ? 10 : actual[i] !== null ? (predicted === actual[i] ? 0 : actual.filter(Boolean).includes(predicted) ? 5 : 10) : null) : null;
                const dotColor = pPts === 0 ? "#10b981" : pPts === 5 ? "#fbbf24" : pPts === 10 ? "#ef4444" : "rgba(255,255,255,0.2)";
                return h("div", { style: { flex: 1, textAlign: "center", padding: "5px 4px", borderRadius: "7px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.05)" } },
                  h("div", { style: { fontSize: "11px", marginBottom: "3px" } }, medal),
                  h("div", { style: { fontSize: "11px", fontWeight: 600, color: predicted ? "#fff" : "rgba(255,255,255,0.2)" } }, predicted || "—"),
                  pPts !== null ? h("div", { style: { fontSize: "10px", fontWeight: 700, color: dotColor, marginTop: "2px" } }, `${pPts}pt`) : null
                );
              })
            )
          ) : null
        ) : null
      );
    }))
  );
}

function renderPredictions() {
  const cp = state.currentPlayer;
  const sorted = [...state.matches].sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));
  const byDate = {};
  sorted.forEach(m => { const k = fmtShort(m.kickoff); if (!byDate[k]) byDate[k] = []; byDate[k].push(m); });
  const now = new Date();
  const firstUnplayed = sorted.find(m => new Date(m.kickoff) > now && m.score_a === null);
  const medals = ["🥇","🥈","🥉"];
  const labels = ["Campeão","2º Lugar","3º Lugar"];
  const [podiumChamp, podiumSecond, podiumThird] = derivePodiumFromBracket(state.editBracket);
  const podiumTeams = [podiumChamp, podiumSecond, podiumThird];
  const hasPodium = podiumTeams.some(t => t);

  return h("div", { className: "content" },
    h("h2", { style: { marginBottom: "4px" } }, "Os Meus Prognósticos"),
    h("p", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "16px" } },
      "A jogar como ", h("span", { style: { color: "#34d399", fontWeight: 700 } }, cp?.name || "")
    ),
    // Podium — read-only, derived from bracket (locked until predictions submitted)
    h("div", { className: "podium-bar" },
      h("div", { className: "podium-card" },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" } },
          h("div", { style: { fontSize: "12px", fontWeight: 700, color: "rgba(251,191,36,0.8)", textTransform: "uppercase", letterSpacing: "0.5px" } }, "Pódio Final"),
          state.submitted
            ? h("button", { onClick: () => setState({ view: "bracket" }), style: { background: "none", border: "1px solid rgba(251,191,36,0.25)", borderRadius: "8px", color: "rgba(251,191,36,0.7)", fontSize: "11px", fontWeight: 600, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" } }, state.hasBracket ? "Editar →" : "Criar →")
            : null
        ),
        !state.submitted
          ? h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.3)", textAlign: "center", padding: "8px 0" } },
              "Submete os prognósticos para desbloquear a Fase Final")
          : state.bracketStale
          ? h("div", null,
              h("div", { style: { fontSize: "11px", color: "rgba(239,68,68,0.7)", fontWeight: 600, marginBottom: "8px" } }, "⚠️ Prognósticos alterados — resubmete a Fase Final"),
              hasPodium
                ? h("div", { style: { display: "flex", gap: "6px", opacity: 0.5 } },
                    ...[0,1,2].map(i => h("div", { style: { flex: 1, textAlign: "center" } },
                      h("div", { style: { fontSize: "10px", color: "rgba(255,255,255,0.35)", marginBottom: "4px" } }, `${medals[i]} ${labels[i]}`),
                      h("div", { style: { padding: "7px 4px", borderRadius: "8px", background: "rgba(255,255,255,0.06)", fontSize: "11px", fontWeight: 700, color: "rgba(255,255,255,0.4)" } },
                        podiumTeams[i] || "—")
                    ))
                  )
                : null
            )
          : hasPodium
          ? h("div", { style: { display: "flex", gap: "6px" } },
              ...[0,1,2].map(i => h("div", { style: { flex: 1, textAlign: "center" } },
                h("div", { style: { fontSize: "10px", color: "rgba(255,255,255,0.35)", marginBottom: "4px" } }, `${medals[i]} ${labels[i]}`),
                h("div", { style: { padding: "7px 4px", borderRadius: "8px", background: "rgba(255,255,255,0.06)", fontSize: "11px", fontWeight: 700, color: podiumTeams[i] ? "#fff" : "rgba(255,255,255,0.2)" } },
                  podiumTeams[i] || "—")
              ))
            )
          : h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.3)", textAlign: "center", padding: "8px 0" } },
              "Constrói a Fase Final para completar o pódio →")
      )
    ),
    // Matches by day
    ...Object.entries(byDate).map(([dateKey, dayMatches]) => {
      const isToday = dayMatches.some(m => m.id === firstUnplayed?.id);
      return h("div", { style: { marginBottom: "16px" }, id: isToday ? "today-anchor" : undefined },
        h("div", { style: { fontSize: "11px", fontWeight: 700, color: isToday ? "#34d399" : "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "6px", display: "flex", alignItems: "center", gap: "6px" } },
          isToday ? h("span", { style: { width: "6px", height: "6px", borderRadius: "50%", background: "#34d399", display: "inline-block" } }) : null,
          dateKey + (isToday ? " — Próximos jogos" : "")
        ),
        ...dayMatches.map(m => {
          const played = m.score_a !== null;
          const pred = state.editPreds[m.id] || { score_a: 0, score_b: 0 };
          const pts = played ? calcPts(pred, m) : null;
          const ex = played && isExact(pred, m);
          const locked = played || state.deadlinePassed;

          const inpA = document.createElement("input");
          inpA.type = "number"; inpA.min = "0"; inpA.max = "20"; inpA.value = pred.score_a;
          inpA.className = "pred-input"; inpA.disabled = locked;
          inpA.addEventListener("change", () => { if (!locked) { const ep = { ...state.editPreds }; ep[m.id] = { ...ep[m.id], score_a: parseInt(inpA.value) || 0 }; state.editPreds = ep; state.predictionsEdited = true; } });

          const inpB = document.createElement("input");
          inpB.type = "number"; inpB.min = "0"; inpB.max = "20"; inpB.value = pred.score_b;
          inpB.className = "pred-input"; inpB.disabled = locked;
          inpB.addEventListener("change", () => { if (!locked) { const ep = { ...state.editPreds }; ep[m.id] = { ...ep[m.id], score_b: parseInt(inpB.value) || 0 }; state.editPreds = ep; state.predictionsEdited = true; } });

          return h("div", { style: { padding: "10px 12px", borderRadius: "10px", background: ex ? "rgba(16,185,129,0.06)" : played ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.03)", border: `1px solid ${ex ? "rgba(16,185,129,0.15)" : played ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.06)"}`, marginBottom: "4px" } },
            h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: "6px" } },
              h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.3)" } }, `Grupo ${m.group_letter} · ${fmtTime(m.kickoff)}`),
              played ? h("span", { style: { fontSize: "10px", color: "rgba(255,255,255,0.25)" } }, `Resultado: ${m.score_a}-${m.score_b}`) : null,
              pts !== null ? badge(pts, true) : null
            ),
            h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
              h("span", { style: { flex: 1, fontSize: "12px", fontWeight: 600, color: "rgba(255,255,255,0.75)", textAlign: "right" } }, m.team_a),
              inpA,
              h("span", { style: { fontSize: "13px", color: "rgba(255,255,255,0.2)", fontWeight: 700 } }, "-"),
              inpB,
              h("span", { style: { flex: 1, fontSize: "12px", fontWeight: 600, color: "rgba(255,255,255,0.75)", textAlign: "left" } }, m.team_b)
            )
          );
        })
      );
    }),
    // Deadline banner / countdown
    state.deadlinePassed
      ? h("div", { className: "deadline-banner" },
          h("div", { style: { fontSize: "14px", fontWeight: 700, color: "#ef4444" } }, "⏰ Prazo encerrado"),
          h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginTop: "4px" } }, "O prazo para submissão de prognósticos já passou.")
        )
      : state.deadline ? h("div", { style: { background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.15)", borderRadius: "12px", padding: "10px 16px", marginBottom: "16px", textAlign: "center" } },
          h("div", { style: { fontSize: "12px", color: "rgba(251,191,36,0.8)" } }, "⏰ Prazo: " + fmtDate(state.deadline.toISOString()))
        ) : null,
    // Submit / update button
    !state.deadlinePassed ? h("div", { style: { position: "sticky", bottom: "72px", zIndex: 50, padding: "8px 0" } },
      h("button", { className: "submit-btn", onClick: submitPredictions, disabled: state.submitting, style: state.submitting ? { opacity: 0.6, cursor: "wait" } : {} },
        state.submitting ? "A submeter..." : state.submitted ? "Actualizar Prognósticos" : "Submeter Prognósticos")
    ) : null
  );
}

function renderPinModal() {
  if (!state.showPinModal) return null;
  const inp = document.createElement("input");
  inp.type = "password"; inp.maxLength = 30; inp.placeholder = "••••••";
  inp.className = "pin-input" + (state.pinError ? " error" : "");
  inp.value = state.pinValue;
  inp.addEventListener("input", (e) => { state.pinValue = e.target.value; state.pinError = false; });
  inp.addEventListener("keydown", (e) => { if (e.key === "Enter") verifyPin(); });
  setTimeout(() => inp.focus(), 100);

  return h("div", { className: "pin-overlay", onClick: (e) => { if (e.target.className === "pin-overlay") cancelPin(); } },
    h("div", { className: "pin-modal" },
      h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, "🔒"),
      h("div", { style: { fontSize: "15px", fontWeight: 700, color: "#fff", marginBottom: "4px" } }, "Introduz o teu código"),
      h("div", { style: { fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "4px" } },
        "A submeter como ", h("span", { style: { color: "#34d399", fontWeight: 700 } }, state.currentPlayer?.name || "")
      ),
      inp,
      state.pinError ? h("div", { style: { fontSize: "12px", color: "#ef4444", fontWeight: 600, marginBottom: "8px" } }, "Código incorrecto") : null,
      h("button", { className: "pin-btn", onClick: verifyPin }, "Confirmar"),
      h("button", { className: "pin-cancel", onClick: cancelPin }, "Cancelar")
    )
  );
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (state.loading) {
    app.appendChild(h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "80vh", gap: "16px" } },
      h("div", { className: "spinner" }), h("div", { style: { color: "rgba(255,255,255,0.5)", fontSize: "13px" } }, "A carregar dados...")
    ));
    return;
  }
  if (state.error) {
    app.appendChild(h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "80vh", gap: "12px", padding: "20px" } },
      h("div", { style: { fontSize: "32px" } }, "⚠️"),
      h("div", { style: { color: "#ef4444", fontSize: "14px", fontWeight: 600 } }, "Erro ao carregar"),
      h("div", { style: { color: "rgba(255,255,255,0.4)", fontSize: "12px", textAlign: "center" } }, state.error),
      h("button", { onClick: loadData, style: { marginTop: "8px", padding: "8px 20px", borderRadius: "8px", border: "none", background: "#34d399", color: "#0f172a", fontWeight: 700, fontSize: "13px", cursor: "pointer", fontFamily: "inherit" } }, "Tentar novamente")
    ));
    return;
  }

  app.appendChild(renderHeader());

  if (state.view === "matches") app.appendChild(renderMatches());
  else if (state.view === "matchDetail") app.appendChild(renderMatchDetail());
  else if (state.view === "leaderboard") app.appendChild(renderLeaderboard());
  else if (state.view === "predictions") app.appendChild(renderPredictions());
  else if (state.view === "bracket") app.appendChild(renderBracket());

  app.appendChild(renderNav());

  // PIN modal overlay
  const pinModal = renderPinModal();
  if (pinModal) app.appendChild(pinModal);

  // Standings modal overlay
  const standingsModal = renderStandingsModal();
  if (standingsModal) app.appendChild(standingsModal);

  // Init chart on leaderboard view
  if (state.view === "leaderboard") {
    setTimeout(() => initChart(), 0);
  }

  // Auto-scroll to today on predictions view
  if (state.view === "predictions") {
    setTimeout(() => { const el = document.getElementById("today-anchor"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 200);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
