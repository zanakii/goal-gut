# .github/workflows/fetch-results.yml
#
# Live-results poller. Runs every 2 minutes during match hours
# throughout WC2026 — June (group stage) and July (knockouts through
# the final on July 19). Public-repo Actions are unmetered.
#
# It calls fetch-results.js which:
#   1. Checks if there are pending matches (scheduled or live) in window
#   2. If yes, calls football-data.org v4 (1 request)
#   3. Writes live + finished scores to Supabase
#
# football-data.org free tier: 10 requests/minute, no daily cap.
# Our peak ~30 fires/hour is well within budget.

name: Fetch WC Results

on:
  schedule:
    # Every 2 min, 4PM-11PM UTC (afternoon/evening kickoffs)
    - cron: '*/2 16-23 * 6,7 *'
    # Every 2 min, 12AM-7AM UTC (covers AET/penalties on late kickoffs)
    - cron: '*/2 0-6 * 6,7 *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node fetch-results.js
