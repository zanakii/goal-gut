# .github/workflows/fetch-results.yml
#
# Live-results poller. Runs every 15 minutes, all hours, throughout
# WC2026 — June (group stage) and July (knockouts through the final on
# July 19). Public-repo Actions are unmetered.
#
# The schedule runs around the clock (not just match hours) on purpose:
# a narrow hour-window cron once straddled live matches and froze a
# score mid-game. All-hours + smart-skip is cheaper to reason about.
#
# It calls fetch-results.js which:
#   1. Checks if there are pending matches (scheduled or live) in window
#   2. If yes, calls football-data.org v4 (1 request) — else skips (smart-skip)
#   3. Writes live + finished scores to Supabase
#
# football-data.org free tier: 10 requests/minute, no daily cap.
# At 4 fires/hour, well within budget.

name: Fetch WC Results

on:
  schedule:
    # Every 15 min, all hours, June & July only (months 6,7).
    - cron: '*/15 * * 6,7 *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node fetch-results.js
